<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Adeptio Adaptive HR — Owner Edition · v2.4.1.smbowner (preview)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%235C6493'/><text x='32' y='44' font-size='36' font-family='Manrope,sans-serif' font-weight='700' fill='white' text-anchor='middle'>A</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+Lao:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ADEPTIO ADAPTIVE HR · Platform UI v2.4.1.smbowner · Owner Edition
   Design tokens — Atelier Pastel (series style · no drift)
   Source of truth: Structure Blueprint v2.4.1.SmbOwner
   Carried verbatim from v2.4.0.db.auth; persona accent map
   re-pointed to the Owner-Edition's THREE personas:
     staff    → ochre   owner → plum   platform → teal
   (the 5 named hues are kept underneath so cells/badges reuse them)
   ============================================================ */

:root{
  /* Brand */
  --brand:#5C6493; --brand-deep:#404668; --brand-bg:#E8E9F1;

  /* Neutrals — warm cream canvas */
  --ink:#222127; --ink-2:#4A4954; --muted:#7C786F; --muted-2:#AFABA1;
  --line:#E7E3DA; --line-2:#F0EDE6;
  --canvas:#F2F1EC; --surface:#FFFFFF; --surface-2:#FBFAF7;

  /* Named hues — hard-firm pastel (do not drift) */
  --staff:#C28A4A; --staff-d:#7E5722; --staff-bg:#F4E8D6; --staff-ln:#E9D6B8;
  --mgr:#6E9A6E;   --mgr-d:#3F623F;   --mgr-bg:#DEEBDD;   --mgr-ln:#C6DCC4;
  --hr:#6E8FC0;    --hr-d:#3C567F;    --hr-bg:#E0E8F5;    --hr-ln:#C8D6EE;
  --ceo:#9279B8;   --ceo-d:#5A4282;   --ceo-bg:#EAE2F3;   --ceo-ln:#D9CCEC;
  --sys:#5E91A0;   --sys-d:#345661;   --sys-bg:#DDEAEE;   --sys-ln:#C2DBE2;

  /* Owner-Edition persona aliases (3 personas) */
  --owner:#9279B8;    --owner-d:#5A4282;    --owner-bg:#EAE2F3;    --owner-ln:#D9CCEC;
  --platform:#5E91A0; --platform-d:#345661; --platform-bg:#DDEAEE; --platform-ln:#C2DBE2;

  /* Status (-text variants are AA-safe for small type on white) */
  --ok:#5E8C63; --ok-bg:#E2EEE3; --ok-text:#3F6244;
  --warn:#C28A4A; --warn-bg:#F4E8D6; --warn-text:#8F6020;
  --bad:#B5675C; --bad-bg:#F3E1DE; --bad-text:#94503F;

  /* Active persona accent — set by [data-persona] on <body> */
  --acc:var(--brand); --acc-d:var(--brand-deep); --acc-bg:var(--brand-bg); --acc-ln:var(--line);

  /* Geometry */
  --r:16px; --r-sm:11px; --r-lg:22px; --r-xl:30px;
  --sh:0 1px 1px rgba(40,38,33,.03), 0 12px 34px -20px rgba(40,38,33,.20);
  --sh-sm:0 1px 2px rgba(40,38,33,.04);
  --sh-lg:0 2px 4px rgba(40,38,33,.04), 0 30px 70px -30px rgba(40,38,33,.30);
  --maxw:1200px;

  /* Type — Manrope + Noto Sans Lao staged for ລາວ (bilingual build) */
  --font:"Manrope","Noto Sans Lao",-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  --display:"Manrope","Noto Sans Lao",-apple-system,"SF Pro Display","Segoe UI",sans-serif;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;

  /* Motion */
  --ease:cubic-bezier(.22,.61,.36,1);
  --t:160ms var(--ease);
}

/* Persona accent switching — one attribute drives the whole shell.
   Three personas in this edition; managers ride the owner shell (delegated). */
body[data-persona="staff"]    { --acc:var(--staff); --acc-d:var(--staff-d); --acc-bg:var(--staff-bg); --acc-ln:var(--staff-ln); }
body[data-persona="owner"]    { --acc:var(--owner); --acc-d:var(--owner-d); --acc-bg:var(--owner-bg); --acc-ln:var(--owner-ln); }
body[data-persona="platform"] { --acc:var(--platform); --acc-d:var(--platform-d); --acc-bg:var(--platform-bg); --acc-ln:var(--platform-ln); }

/* ============================================================
   ADEPTIO ADAPTIVE HR · Platform UI v2.3 — application styles
   Sections:
   01 base & typography      05 components (cards, kpi, table…)
   02 topbar                 06 forms & buttons
   03 launcher (persona hub) 07 mobile frame
   04 web shell (rail)       08 toast · misc

   Responsiveness (v2.4.0): CONTAINER QUERIES + NO-MEDIA-QUERY
   LAYOUTS — zero viewport layout breakpoints. Named containers:
   topbar · shell · stage · content (workspace-inner, app-body,
   landing-auth) · panel (login-card); cards stay anonymous
   containers. Everything else is intrinsic: auto-fit grids with
   minmax(min(100%,…)), clamp() fluid type/space, flex-wrap,
   overflow-safe centering. Components now respond to the space
   they're IN — the same .grid collapses inside the 384px phone
   frame while staying 4-up on the desktop workspace beside it.
   (The only @media left is prefers-reduced-motion — a11y, not layout.)
   ============================================================ */

/* ---------- 01 · base & typography ---------- */
*,*::before,*::after{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
html{ -webkit-text-size-adjust:100%; }
body{
  font-family:var(--font); color:var(--ink); background:var(--canvas);
  font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased;
  min-height:100vh; font-kerning:normal; font-feature-settings:"kern","liga";
  text-rendering:optimizeLegibility;
}
h1,h2,h3,h4{ font-family:var(--display); margin:0; font-weight:600; letter-spacing:-.02em; text-wrap:balance; }

/* thin, quiet scrollbars everywhere */
*{ scrollbar-width:thin; scrollbar-color:var(--muted-2) transparent; }
*::-webkit-scrollbar{ width:9px; height:9px; }
*::-webkit-scrollbar-thumb{ background:var(--line); border-radius:99px; border:2.5px solid var(--canvas); }
*::-webkit-scrollbar-thumb:hover{ background:var(--muted-2); }
*::-webkit-scrollbar-track{ background:transparent; }
p{ margin:0; }
a{ color:var(--acc-d); text-decoration:none; }
button{ font-family:var(--font); cursor:pointer; }
:focus-visible{ outline:2px solid var(--acc); outline-offset:2px; border-radius:4px; }
::selection{ background:var(--acc-bg); color:var(--acc-d); }

.mono{ font-family:var(--mono); font-size:.86em; letter-spacing:0; }
.eyebrow{
  font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
  color:var(--muted);
}
.eyebrow.acc{ color:var(--acc-d); }
.num{ font-variant-numeric:tabular-nums; }

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{ animation-duration:.01ms!important; transition-duration:.01ms!important; }
}

/* ---------- 02 · topbar ---------- */
.topbar{
  container:topbar / inline-size;
  position:sticky; top:0; z-index:60; min-height:58px;
  display:flex; align-items:center; flex-wrap:wrap; row-gap:6px;
  gap:clamp(8px, 1.2cqi, 14px); padding:6px clamp(10px, 2.2vw, 22px);
  background:color-mix(in srgb, var(--canvas) 86%, transparent);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  transition:box-shadow .25s var(--ease);
}
body[data-scrolled="true"] .topbar{ box-shadow:0 8px 24px -18px rgba(40,38,33,.35); }
.topbar .logo{ display:flex; align-items:center; gap:10px; cursor:pointer; background:none; border:0; padding:4px 6px 4px 2px; border-radius:10px; }
.logo-mark{
  width:30px; height:30px; border-radius:9px; display:grid; place-items:center;
  background:linear-gradient(135deg,var(--brand) 0%,var(--brand-deep) 100%);
  color:#fff; font-family:var(--display); font-weight:700; font-size:15px;
  box-shadow:var(--sh-sm);
}
.logo-word{ font-family:var(--display); font-weight:700; font-size:15.5px; letter-spacing:-.01em; color:var(--ink); }
.logo-sub{ font-size:10.5px; color:var(--muted); font-weight:600; letter-spacing:.08em; text-transform:uppercase; margin-top:1px; }
.topbar .ver{
  font-family:var(--mono); font-size:10.5px; color:var(--muted);
  border:1px solid var(--line); border-radius:99px; padding:3px 9px; background:var(--surface);
  white-space:nowrap;
}

.persona-switch{ display:flex; gap:4px; margin-left:8px; padding:4px; background:var(--line-2); border-radius:99px; }
.pchip{
  display:flex; align-items:center; gap:7px; border:1px solid transparent; background:transparent;
  border-radius:99px; padding:5px 12px; font-size:12.5px; font-weight:600; color:var(--ink-2);
  transition:background var(--t), color var(--t), border-color var(--t); white-space:nowrap;
}
.pchip .dot{ width:8px; height:8px; border-radius:99px; background:var(--pc,#999); flex:none; }
.pchip:hover{ background:var(--surface); }
.pchip[aria-pressed="true"]{ background:var(--surface); border-color:var(--pl,var(--line)); color:var(--pd,var(--ink)); box-shadow:var(--sh-sm); }

.topbar .spacer{ flex:1; }

.seg{ display:flex; padding:3px; background:var(--line-2); border-radius:99px; }
.seg button{
  border:0; background:transparent; border-radius:99px; padding:5px 14px;
  font-size:12px; font-weight:700; color:var(--muted); display:flex; align-items:center; gap:6px;
  transition:background var(--t), color var(--t);
}
.seg button[aria-pressed="true"]{ background:var(--surface); color:var(--ink); box-shadow:var(--sh-sm); }
.seg.lang button[aria-pressed="true"]{ color:var(--acc-d); }
.seg button svg{ width:14px; height:14px; }

.topbar .avatar-btn{ border:0; background:none; padding:0; }

/* the bar responds to its own width — not the viewport */
@container topbar (max-width: 1060px){
  .topbar .ver{ display:none; }
}
@container topbar (max-width: 940px){
  .persona-switch .pchip span.pl{ display:none; }
  .pchip{ padding:5px 9px; }
}

/* ---------- 03 · launcher ---------- */
.launcher{ max-width:var(--maxw); margin:0 auto; padding:clamp(36px,6vw,64px) clamp(18px,3.4vw,32px) clamp(56px,8vw,90px); position:relative; }
.launcher::before{ /* ambient brand wash — depth without noise */
  content:""; position:absolute; top:-140px; right:-80px; width:560px; height:560px;
  background:radial-gradient(closest-side, var(--brand-bg) 0%, transparent 72%);
  opacity:.7; pointer-events:none;
}
.launcher > *{ position:relative; }
.launcher .hero{ max-width:780px; margin-bottom:54px; }
.launcher h1{
  font-size:clamp(38px,5.2vw,62px); line-height:1.04; font-weight:600; letter-spacing:-.035em;
  margin:18px 0 20px;
}
.launcher h1 em{ font-style:normal; color:var(--muted-2); }
.launcher .lede{ font-size:16.5px; line-height:1.65; color:var(--ink-2); max-width:620px; }
.launcher .lede strong{ font-weight:700; }

.hub-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(min(100%,206px),1fr)); gap:14px; margin-top:clamp(26px,4vw,42px); }
.hub-card{
  position:relative; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg);
  padding:22px 20px 18px; display:flex; flex-direction:column; gap:0; min-height:300px;
  transition:transform .22s var(--ease), box-shadow .22s var(--ease), border-color .22s var(--ease);
  cursor:pointer;
}
.hub-card:hover{ transform:translateY(-4px); box-shadow:var(--sh-lg); border-color:var(--pl); }
.hub-card:hover .swatch{ transform:scale(1.06) rotate(-3deg); }
.hub-card .swatch{ transition:transform .22s var(--ease); }
.hub-card .swatch{ width:34px; height:34px; border-radius:11px; background:var(--pb); border:1px solid var(--pl); display:grid; place-items:center; color:var(--pd); margin-bottom:14px; }
.hub-card .swatch svg{ width:17px; height:17px; }
.hub-card .who{ font-size:10.5px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--pd); }
.hub-card h3{ font-size:18.5px; margin:5px 0 3px; }
.hub-card .tag{ font-size:12.5px; color:var(--muted); margin-bottom:13px; }
.hub-card ul{ list-style:none; margin:0 0 16px; padding:0; display:flex; flex-direction:column; gap:6px; }
.hub-card li{ font-size:12.5px; color:var(--ink-2); padding-left:15px; position:relative; }
.hub-card li::before{ content:""; position:absolute; left:0; top:7.5px; width:5px; height:5px; border-radius:99px; background:var(--pc); }
.hub-card .enter{ margin-top:auto; display:flex; gap:8px; }
.hub-card .enter button{
  flex:1; border:1px solid var(--pl); background:var(--pb); color:var(--pd);
  border-radius:10px; padding:8px 10px; font-size:12.5px; font-weight:700;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:filter var(--t), transform var(--t);
}
.hub-card .enter button.ghosted{ background:var(--surface); border-color:var(--line); color:var(--ink-2); flex:0 0 auto; padding:8px 12px; }
.hub-card .enter button:hover{ filter:brightness(.97); }
.hub-card .enter svg{ width:14px; height:14px; }

.launch-meta{
  margin-top:46px; display:flex; flex-wrap:wrap; gap:10px 28px; padding-top:22px; border-top:1px solid var(--line);
  font-size:12.5px; color:var(--muted);
}
.launch-meta b{ color:var(--ink-2); font-weight:700; }

/* ---------- 04 · web shell ---------- */
.shell{ display:flex; min-height:calc(100vh - 58px); container:shell / inline-size; }

/* rail folds to icon-width when the SHELL narrows (was @media 1024px) */
@container shell (max-width: 1024px){
  .rail{ width:74px; padding:18px 10px; }
  .rail .group, .rail-head .t, .rail-head .s, .nav-item span.lbl, .rail-foot .note, .tier-chip span{ display:none; }
  .rail-head{ justify-content:center; padding:6px 0 12px; }
  .nav-item{ justify-content:center; padding:10px; }
  .nav-item .count{ position:absolute; top:3px; right:3px; margin:0; padding:1px 5px; min-width:16px; }
}
.rail{
  width:242px; flex:none; border-right:1px solid var(--line);
  padding:20px 14px 18px; display:flex; flex-direction:column; gap:4px;
  position:sticky; top:58px; height:calc(100vh - 58px); overflow-y:auto;
  background:color-mix(in srgb, var(--surface) 38%, var(--canvas));
}
.rail-head{
  display:flex; align-items:center; gap:10px; padding:10px 10px 14px; margin-bottom:6px;
  border-bottom:1px solid var(--line-2);
}
.rail-head .pin{ width:34px; height:34px; border-radius:11px; background:var(--acc-bg); border:1px solid var(--acc-ln); display:grid; place-items:center; color:var(--acc-d); flex:none; }
.rail-head .pin svg{ width:16px; height:16px; }
.rail-head .t{ font-size:13.5px; font-weight:700; letter-spacing:-.01em; }
.rail-head .s{ font-size:11px; color:var(--muted); margin-top:1px; }

.rail .group{ margin:14px 4px 5px; }
.nav-item{
  display:flex; align-items:center; gap:11px; width:100%;
  border:0; background:transparent; text-align:left;
  padding:8.5px 11px; border-radius:11px; font-size:13.2px; font-weight:600; color:var(--ink-2);
  position:relative; transition:background var(--t), color var(--t);
}
.nav-item svg{ width:17px; height:17px; flex:none; opacity:.78; }
.nav-item:hover{ background:var(--line-2); color:var(--ink); }
.nav-item[aria-current="true"]{ background:var(--acc-bg); color:var(--acc-d); }
.nav-item[aria-current="true"] svg{ opacity:1; }
.nav-item[aria-current="true"]::before{
  content:""; position:absolute; left:-14px; top:8px; bottom:8px; width:3px; border-radius:0 3px 3px 0; background:var(--acc);
}
.nav-item .count{
  margin-left:auto; font-size:10.5px; font-weight:700; font-family:var(--mono);
  background:var(--acc); color:#fff; padding:1.5px 7px; border-radius:99px; min-width:20px; text-align:center;
}
.nav-item:not([aria-current="true"]) .count{ background:var(--line); color:var(--ink-2); }

.rail-foot{ margin-top:auto; padding:14px 10px 4px; border-top:1px solid var(--line-2); display:flex; flex-direction:column; gap:9px; }
.tier-chip{ display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--ink-2); font-weight:600; }
.tier-chip .led{ width:7px; height:7px; border-radius:99px; background:var(--ok); box-shadow:0 0 0 3px var(--ok-bg); }
.rail-foot .note{ font-size:10.5px; color:var(--muted); line-height:1.5; }

.workspace{ flex:1; min-width:0; padding:clamp(24px, 3.2vw, 36px) clamp(22px, 3.8vw, 44px) 88px; }
.workspace-inner{ max-width:1080px; margin:0 auto; container:content / inline-size; }

/* Entrance: one brief container fade only.
   Per-child staggers were dropped — throttled/background tabs freeze CSS animations
   at their from-state, which held content at opacity:0. Never hold content invisible. */
body[data-anim="off"] .screen-fade{ animation:none; } /* same-route ledger re-renders repaint without replaying */

/* screen header */
.crumbs{ display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--muted); font-weight:600; margin-bottom:10px; min-height:18px; flex-wrap:wrap; }
.crumbs a{ color:var(--muted); }
.crumbs a:hover{ color:var(--acc-d); }
.crumbs svg{ width:11px; height:11px; opacity:.6; }
.crumbs .here{ color:var(--acc-d); }
.screen-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:18px; margin-bottom:30px; flex-wrap:wrap; }
.screen-head h1{ font-size:clamp(21px, 4cqi, 28px); letter-spacing:-.03em; }
.screen-head .sub{ font-size:13px; color:var(--muted); margin-top:6px; max-width:640px; text-wrap:pretty; }
.screen-head .actions{ display:flex; gap:9px; flex:none; flex-wrap:wrap; }

/* ---------- 05 · components ---------- */
.grid{ display:grid; gap:clamp(10px, 1.8cqi, 16px); }
.cols-2{ grid-template-columns:repeat(2,minmax(0,1fr)); }
.cols-3{ grid-template-columns:repeat(3,minmax(0,1fr)); }
.cols-4{ grid-template-columns:repeat(4,minmax(0,1fr)); }
.span-2{ grid-column:span 2; }

/* grids respond to their CONTENT container (workspace, phone body,
   landing panel) — the same markup is 4-up on desktop, 2-up inside
   the 384px phone frame, 1-up in a truly narrow pane. */
@container content (max-width: 1020px){
  .cols-4{ grid-template-columns:repeat(2,minmax(0,1fr)); }
}
@container content (max-width: 760px){
  .cols-3{ grid-template-columns:repeat(2,minmax(0,1fr)); }
}
@container content (max-width: 560px){
  .cols-3{ grid-template-columns:minmax(0,1fr); }
  .span-2{ grid-column:auto; }
  .la-session .btn{ flex:1 1 auto; justify-content:center; }
}
@container content (max-width: 460px){
  .cols-4{ grid-template-columns:minmax(0,1fr); }
}
@container content (max-width: 320px){
  .cols-2{ grid-template-columns:minmax(0,1fr); }
}

.card{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
  padding:22px; box-shadow:var(--sh-sm); min-width:0;
  container-type:inline-size;
}
.card.tinted{ background:linear-gradient(160deg, var(--acc-bg) 0%, var(--surface) 70%); border-color:var(--acc-ln); }
.card-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
.card-head .t{ font-size:13px; font-weight:700; letter-spacing:-.01em; display:flex; align-items:center; gap:8px; min-width:0; }
.card-head .t svg{ width:15px; height:15px; color:var(--acc-d); flex:none; }
.card-head .link{ font-size:12px; font-weight:700; color:var(--acc-d); background:none; border:0; padding:2px 4px; display:flex; align-items:center; gap:4px; white-space:nowrap; }
.card-head .link svg{ width:12px; height:12px; }
.card-head .link:hover{ text-decoration:underline; }

.kpi{ display:flex; flex-direction:column; gap:6px; padding:19px 22px; min-width:0; }
.kpi .k-label{ font-size:10.8px; font-weight:700; letter-spacing:.13em; text-transform:uppercase; color:var(--muted); }
.kpi .k-value{ font-family:var(--display); font-size:32px; font-weight:500; letter-spacing:-.035em; line-height:1.08; font-variant-numeric:tabular-nums; }
.kpi .k-value small{ font-size:15px; font-weight:600; color:var(--muted); letter-spacing:0; }
.kpi .k-sub{ font-size:11.5px; color:var(--muted); display:flex; align-items:center; gap:6px; }
.kpi .k-sub .up{ color:var(--ok-text); font-weight:700; }
.kpi .k-sub .down{ color:var(--bad-text); font-weight:700; }
.kpi.hero .k-value{ color:var(--acc-d); }

.badge{
  display:inline-flex; align-items:center; gap:5px; border-radius:99px; padding:2.5px 9px;
  font-size:10.8px; font-weight:700; letter-spacing:.02em; white-space:nowrap;
  background:var(--line-2); color:var(--ink-2);
}
.badge::before{ content:""; width:5px; height:5px; border-radius:99px; background:currentColor; opacity:.75; }
.badge.ok{ background:var(--ok-bg); color:var(--ok-text); }
.badge.warn{ background:var(--warn-bg); color:var(--warn-text); }
.badge.bad{ background:var(--bad-bg); color:var(--bad-text); }
.badge.acc{ background:var(--acc-bg); color:var(--acc-d); }
.badge.plain::before{ display:none; }

.idtag{ font-family:var(--mono); font-size:11px; font-weight:600; color:var(--ink-2); background:var(--line-2); border-radius:6px; padding:2px 7px; white-space:nowrap; }

/* list rows */
.rowlist{ display:flex; flex-direction:column; }
.rowitem{
  display:flex; align-items:center; gap:13px; padding:11.5px 2px; border-top:1px solid var(--line-2);
  min-width:0;
}
.rowitem:first-child{ border-top:0; }
.rowitem .ric{ width:34px; height:34px; border-radius:10px; flex:none; display:grid; place-items:center; background:var(--acc-bg); color:var(--acc-d); }
.rowitem .ric.n{ background:var(--line-2); color:var(--ink-2); }
.rowitem .ric svg{ width:16px; height:16px; }
.rowitem .rmain{ flex:1; min-width:0; }
.rowitem .rt{ font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rowitem .rs{ font-size:11.5px; color:var(--muted); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rowitem .rside{ flex:none; display:flex; align-items:center; gap:8px; text-align:right; }
.rowitem.click{ cursor:pointer; border-radius:10px; margin:0 -8px; padding:11.5px 10px; transition:background var(--t); }
.rowitem.click:hover{ background:var(--surface-2); }

/* table */
.tablewrap{ overflow-x:auto; }
table.tbl{ width:100%; border-collapse:collapse; font-size:12.8px; }
.tbl th{
  text-align:left; font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--muted); padding:8px 12px; border-bottom:1px solid var(--line); white-space:nowrap;
}
.tbl td{ padding:10.5px 12px; border-bottom:1px solid var(--line-2); vertical-align:middle; }
.tbl tr:last-child td{ border-bottom:0; }
.tbl tr.click{ cursor:pointer; transition:background var(--t); }
.tbl tr.click:hover{ background:var(--surface-2); }
.tbl td.r, .tbl th.r{ text-align:right; }
.tbl .strong{ font-weight:700; }

/* approval queue row */
.qrow{
  display:flex; align-items:center; gap:14px; padding:13px 16px; border:1px solid var(--line);
  border-radius:14px; background:var(--surface); margin-bottom:10px; min-width:0;
  transition:border-color var(--t), box-shadow var(--t), transform var(--t);
}
.qrow:hover{ border-color:var(--acc-ln); box-shadow:var(--sh-sm); transform:translateY(-1px); }
.qrow .qmain{ flex:1; min-width:0; cursor:pointer; }
.qrow .qt{ font-size:13.5px; font-weight:700; display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
.qrow .qs{ font-size:12px; color:var(--muted); margin-top:2px; }
.qrow .qact{ display:flex; gap:7px; flex:none; }
.qrow .sla, .sla{ font-size:10.5px; font-weight:700; font-family:var(--mono); color:var(--warn-text); }

/* avatar */
.avatar{
  width:32px; height:32px; border-radius:99px; background:var(--acc-bg); color:var(--acc-d);
  display:grid; place-items:center; font-size:11.5px; font-weight:800; flex:none;
  border:1.5px solid var(--acc-ln);
}
.avatar.lg{ width:52px; height:52px; font-size:17px; border-radius:16px; }

/* progress steps (payroll run, flows) — stacks vertically in narrow cards (container query) */
.steps{ display:flex; gap:0; margin:6px 0 2px; flex-wrap:wrap; row-gap:14px; }
.step{ flex:1; min-width:120px; position:relative; padding:0 14px 0 0; }
.step::before{ content:""; position:absolute; top:13px; left:26px; right:2px; height:2px; background:var(--line); border-radius:2px; }
.step:last-child::before{ display:none; }
@container (max-width: 360px){
  .steps{ flex-direction:column; row-gap:0; }
  .step{ min-width:0; display:grid; grid-template-columns:26px 1fr; column-gap:12px; align-items:start; padding:0 0 16px; }
  .step .sdot{ margin-bottom:0; grid-row:1 / span 2; }
  .step .st{ padding-top:4px; }
  .step .ss{ grid-column:2; }
  .step::before{ top:30px; left:12px; right:auto; bottom:2px; width:2px; height:auto; }
}
.step .sdot{
  width:26px; height:26px; border-radius:99px; border:2px solid var(--line); background:var(--surface);
  display:grid; place-items:center; font-size:11px; font-weight:800; color:var(--muted); margin-bottom:8px;
}
.step.done .sdot{ background:var(--acc); border-color:var(--acc); color:#fff; }
.step.done::before{ background:var(--acc); }
.step.now .sdot{ border-color:var(--acc); color:var(--acc-d); box-shadow:0 0 0 4px var(--acc-bg); }
.step .st{ font-size:12px; font-weight:700; }
.step .ss{ font-size:11px; color:var(--muted); margin-top:1px; }
.step.now .st{ color:var(--acc-d); }

/* charts */
.chart{ width:100%; height:auto; display:block; }
.legend{ display:flex; gap:16px; flex-wrap:wrap; font-size:11px; color:var(--muted); font-weight:600; margin-top:10px; }
.legend i{ width:9px; height:9px; border-radius:3px; display:inline-block; margin-right:6px; vertical-align:-1px; }

/* heat calendar */
.heatcal{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.heatcal .hc{ aspect-ratio:1; border-radius:6px; background:var(--line-2); display:grid; place-items:center; font-size:9.5px; color:var(--muted); font-weight:600; }
.heatcal .hc.l1{ background:var(--acc-bg); color:var(--acc-d); }
.heatcal .hc.l2{ background:var(--acc-ln); color:var(--acc-d); }
.heatcal .hc.l3{ background:var(--acc); color:#fff; }
.heatcal .hc.off{ background:transparent; border:1px dashed var(--line); }
.heatcal .hc.bad{ background:var(--bad-bg); color:var(--bad-text); }
.heatcal .dow{ background:none; color:var(--muted-2); font-size:9px; aspect-ratio:auto; padding-bottom:2px; }

/* empty state */
.empty{ text-align:center; padding:36px 20px; color:var(--muted); }
.empty svg{ width:30px; height:30px; opacity:.4; margin-bottom:10px; }
.empty .et{ font-size:13px; font-weight:600; color:var(--ink-2); }
.empty .es{ font-size:12px; margin-top:3px; }

/* read-only ribbon (CEO) */
.ro-chip{
  display:inline-flex; align-items:center; gap:6px; font-size:10.5px; font-weight:800; letter-spacing:.1em;
  text-transform:uppercase; color:var(--ceo-d); background:var(--ceo-bg); border:1px solid var(--ceo-ln);
  border-radius:99px; padding:4px 11px;
}
.ro-chip svg{ width:12px; height:12px; }

/* ---------- 06 · forms & buttons ---------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  border:1px solid var(--acc); background:var(--acc); color:#fff;
  border-radius:10px; padding:8.5px 16px; font-size:12.8px; font-weight:700; letter-spacing:.01em;
  transition:filter var(--t), transform var(--t), box-shadow var(--t); white-space:nowrap;
}
.btn:not(.ghost):not(.danger):hover{ box-shadow:0 6px 16px -8px var(--acc); }
.btn:hover{ filter:brightness(.94); }
.btn:active{ transform:translateY(1px); }
.btn svg{ width:14px; height:14px; }
.btn.ghost{ background:var(--surface); border-color:var(--line); color:var(--ink-2); }
.btn.ghost:hover{ border-color:var(--muted-2); filter:none; color:var(--ink); }
.btn.soft{ background:var(--acc-bg); border-color:var(--acc-ln); color:var(--acc-d); }
.btn.ok{ background:var(--ok); border-color:var(--ok); }
.btn.danger{ background:var(--surface); border-color:var(--line); color:var(--bad); }
.btn.danger:hover{ border-color:var(--bad); filter:none; }
.btn.sm{ padding:6px 12px; font-size:12px; border-radius:9px; }
.btn.xs{ padding:4.5px 10px; font-size:11.3px; border-radius:8px; }
.btn[disabled]{ opacity:.45; cursor:not-allowed; }

.field{ display:flex; flex-direction:column; gap:6px; margin-bottom:16px; min-width:0; }
.field label{ font-size:11.5px; font-weight:700; color:var(--ink-2); letter-spacing:.02em; }
.field .hint{ font-size:11px; color:var(--muted); }
.input, select.input, textarea.input{
  width:100%; border:1px solid var(--line); border-radius:10px; background:var(--surface);
  padding:9px 12px; font-size:13px; font-family:var(--font); color:var(--ink);
  transition:border-color var(--t), box-shadow var(--t);
}
.input:focus{ outline:none; border-color:var(--acc); box-shadow:0 0 0 3px var(--acc-bg); }
textarea.input{ resize:vertical; min-height:74px; }

.choice-row{ display:flex; gap:8px; flex-wrap:wrap; }
.choice{
  border:1px solid var(--line); background:var(--surface); border-radius:10px; padding:8px 13px;
  font-size:12.3px; font-weight:600; color:var(--ink-2); display:flex; align-items:center; gap:7px;
  transition:all var(--t);
}
.choice svg{ width:14px; height:14px; }
.choice[aria-pressed="true"]{ background:var(--acc-bg); border-color:var(--acc); color:var(--acc-d); }

.switch{ position:relative; width:34px; height:20px; border-radius:99px; background:var(--line); border:0; transition:background var(--t); flex:none; }
.switch::after{ content:""; position:absolute; top:2.5px; left:2.5px; width:15px; height:15px; border-radius:99px; background:#fff; box-shadow:var(--sh-sm); transition:transform var(--t); }
.switch[aria-checked="true"]{ background:var(--acc); }
.switch[aria-checked="true"]::after{ transform:translateX(14px); }

/* ---------- 07 · mobile frame ---------- */
.mobile-stage{
  min-height:calc(100vh - 58px); display:flex; align-items:flex-start; justify-content:center;
  padding:clamp(18px,3.4vw,34px) 20px 60px; gap:clamp(22px,3.6vw,44px);
  container:stage / inline-size;
}
/* the aside yields, then the phone eases down, as the STAGE narrows */
@container stage (max-width: 1180px){ .stage-aside{ display:none; } }
@container stage (max-width: 680px){ .phone{ transform:scale(.92); transform-origin:top center; } }
.phone{
  width:min(384px, 100%); flex:none; background:#101012; border-radius:54px; padding:11px;
  box-shadow:var(--sh-lg), inset 0 0 0 1.5px #2a2a2e;
  position:relative;
}
/* hardware: volume (left) + power (right) */
.phone::before, .phone::after{ content:""; position:absolute; width:3.5px; background:#222226; border-radius:3px; }
.phone::before{ left:-3.5px; top:132px; height:64px; box-shadow:0 84px 0 #222226; }
.phone::after{ right:-3.5px; top:172px; height:88px; }
.phone-screen{
  position:relative; background:var(--canvas); border-radius:44px; overflow:hidden;
  height:clamp(600px, calc(100vh - 158px), 780px); display:flex; flex-direction:column;
}
.statusbar{
  flex:none; display:flex; justify-content:space-between; align-items:center;
  padding:14px 26px 6px; font-size:12.5px; font-weight:700; font-family:var(--display);
}
.statusbar .icons{ display:flex; gap:5px; align-items:center; }
.statusbar svg{ width:15px; height:15px; }
.island{ position:absolute; top:11px; left:50%; transform:translateX(-50%); width:112px; height:30px; border-radius:99px; background:#101012; z-index:5; }

.app-head{
  flex:none; padding:14px 20px 12px; display:flex; align-items:center; gap:11px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(165deg, var(--acc-bg) 0%, var(--canvas) 90%);
}
.app-head .ah-t{ font-size:15.5px; font-weight:800; letter-spacing:-.02em; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.app-head .ah-s{ font-size:10.5px; color:var(--muted); font-weight:600; }
.app-head .bell{ position:relative; border:0; background:var(--surface); border:1px solid var(--line); width:32px; height:32px; border-radius:99px; display:grid; place-items:center; color:var(--ink-2); }
.app-head .bell svg{ width:15px; height:15px; }
.app-head .bell .ping{ position:absolute; top:7px; right:8px; width:7px; height:7px; border-radius:99px; background:var(--bad); border:1.5px solid var(--surface); }
.app-head .back{ border:0; background:var(--surface); border:1px solid var(--line); width:32px; height:32px; border-radius:99px; display:grid; place-items:center; color:var(--ink-2); flex:none; }
.app-head .back svg{ width:15px; height:15px; }

.app-body{ flex:1; overflow-y:auto; padding:16px 16px 20px; display:flex; flex-direction:column; gap:12px; scrollbar-width:thin; container:content / inline-size; }
.app-body > *{ flex:0 0 auto; } /* scroll container: children must never flex-shrink (clock-hero has overflow:hidden → would collapse) */
.app-body .card{ padding:16px; border-radius:15px; }
.app-body .kpi{ padding:13px 15px; }
.app-body .kpi .k-value{ font-size:24px; }
.app-body .screen-title{ font-size:20px; font-weight:700; letter-spacing:-.02em; margin:4px 2px 0; }

.tabbar{
  flex:none; display:flex; border-top:1px solid var(--line); background:color-mix(in srgb, var(--surface) 92%, transparent);
  backdrop-filter:blur(10px); padding:8px 10px 6px;
}
.tab{
  flex:1; border:0; background:none; display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size:9.8px; font-weight:700; color:var(--muted); padding:5px 2px; border-radius:10px;
  transition:color var(--t);
}
.tab svg{ width:20px; height:20px; }
.tab[aria-current="true"]{ color:var(--acc-d); }
.tab .tdot{ width:4px; height:4px; border-radius:99px; background:transparent; }
.tab[aria-current="true"] .tdot{ background:var(--acc); }
.homebar{ flex:none; height:18px; display:grid; place-items:center; }
.homebar i{ width:120px; height:4.5px; border-radius:99px; background:#1b1b1f; opacity:.85; }

/* big clock-in hero (staff mobile) */
.clock-hero{
  border-radius:18px; padding:18px; color:#fff; position:relative; overflow:hidden;
  background:linear-gradient(150deg, var(--acc) 0%, var(--acc-d) 115%);
  box-shadow:var(--sh);
}
.clock-hero .ch-line{ display:flex; justify-content:space-between; align-items:center; gap:10px; }
.clock-hero .ch-time{ font-family:var(--display); font-size:30px; font-weight:600; letter-spacing:-.03em; font-variant-numeric:tabular-nums; }
.clock-hero .ch-sub{ font-size:11.5px; opacity:.82; font-weight:600; }
.clock-hero .ch-btn{
  border:0; border-radius:13px; background:rgba(255,255,255,.95); color:var(--acc-d);
  font-size:13px; font-weight:800; padding:11px 18px; display:flex; align-items:center; gap:8px;
  box-shadow:0 6px 18px -8px rgba(0,0,0,.4); transition:transform var(--t); white-space:nowrap; flex:none;
}
.clock-hero .ch-btn:active{ transform:scale(.97); }
.clock-hero .geo{ display:flex; align-items:center; gap:6px; font-size:10.5px; opacity:.85; margin-top:12px; font-weight:600; }
.clock-hero .geo svg{ width:12px; height:12px; }

/* phone side panel (context) */
.stage-aside{ width:300px; padding-top:14px; display:flex; flex-direction:column; gap:14px; }
.stage-aside .card{ padding:16px 18px; }
.stage-aside h4{ font-size:12.5px; margin-bottom:6px; }
.stage-aside p{ font-size:12px; color:var(--muted); line-height:1.6; }

/* ---------- 08 · toast · misc · responsive ---------- */
/* ---------- tier locks (v2.3.1.essential) — grey + key-locked ---------- */
svg.lk{ width:12px; height:12px; vertical-align:-2px; flex:none; } /* inline lock glyphs anywhere */
.footer-note svg{ width:13px; height:13px; flex:none; }
.rail-foot .note svg{ width:11px; height:11px; vertical-align:-2px; }
.locked, .locked *{ cursor:not-allowed !important; }
button.locked, .choice.locked{
  opacity:.55; filter:grayscale(.5);
  background:var(--surface-2) !important; border-color:var(--line) !important; color:var(--muted) !important;
  box-shadow:none !important;
}
button.locked:hover, .choice.locked:hover{ transform:none !important; filter:grayscale(.5); }
.badge.lock{ background:var(--line-2); color:var(--muted); gap:4px; }
.badge.lock::before{ display:none; }
.badge.lock svg{ width:10px; height:10px; }
.nav-item.locked{ opacity:.5; }
.nav-item.locked:hover{ background:transparent; color:var(--ink-2); }
.nav-item.locked .lk{ margin-left:auto; width:13px; height:13px; opacity:.8; flex:none; }
.tab.locked{ opacity:.45; }
.pchip.locked{ opacity:.55; }
.pchip.locked .dot{ display:none; }
.pchip .lk{ width:11px; height:11px; opacity:.75; flex:none; }
/* ---------- build-phase features — greyed "soon" affordance (no backing data yet, ≠ tier-lock) ---------- */
.soon, .soon *{ cursor:not-allowed !important; }
button.soon, .choice.soon{ opacity:.5; filter:grayscale(.45); box-shadow:none !important; }
button.soon:hover, .choice.soon:hover{ transform:none !important; filter:grayscale(.45); }
.hub-card.locked .swatch{ filter:grayscale(.85); opacity:.55; }
.hub-card.locked .who, .hub-card.locked h3, .hub-card.locked .tag, .hub-card.locked li{ color:var(--muted); }
.hub-card.locked li::before{ background:var(--muted-2); }
.hub-card.locked:hover{ transform:translateY(-2px); box-shadow:var(--sh-sm); }
.hub-card.locked .enter button{ cursor:pointer !important; opacity:1; filter:none; }
.hub-lock{
  position:absolute; top:16px; right:16px; display:inline-flex; align-items:center; gap:5px;
  font-size:9.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
  background:var(--line-2); color:var(--muted); border-radius:99px; padding:4px 9px;
}
.hub-lock svg{ width:10px; height:10px; }
.row-locked{ opacity:.55; filter:grayscale(.4); }
.seg.tier button[aria-pressed="true"]{ color:var(--brand-deep); }

.toast-wrap{ position:fixed; bottom:26px; right:26px; z-index:200; display:flex; flex-direction:column; gap:8px; }
.toast{
  display:flex; align-items:center; gap:10px; background:var(--ink); color:#fff;
  border-radius:13px; padding:11px 16px; font-size:12.8px; font-weight:600; box-shadow:var(--sh-lg);
  animation:toast-in .28s var(--ease);
  max-width:340px;
}
.toast svg{ width:15px; height:15px; color:#9FCBA4; flex:none; }
.toast.warn svg{ color:#E9C588; }
@keyframes toast-in{ from{ opacity:0; transform:translateY(10px) scale(.97);} to{ opacity:1; transform:none;} }
.toast.out{ opacity:0; transition:opacity .3s; }

.screen-fade{ animation:fade-in .24s var(--ease); }
@keyframes fade-in{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none;} }

.hr-sep{ height:1px; background:var(--line-2); border:0; margin:14px 0; }
.muted{ color:var(--muted); }
.small{ font-size:12px; }

.footer-note{
  max-width:var(--maxw); margin:0 auto; padding:26px 32px 40px; font-size:11.5px; color:var(--muted);
  display:flex; gap:8px; align-items:center; flex-wrap:wrap;
}

/* (viewport layout breakpoints removed — container queries above +
   intrinsic auto-fit/minmax/clamp layouts carry all responsiveness) */

/* ============================================================
   v2.3.2.db additions — Database Studio · Backup Center
   ============================================================ */
.hint{ display:block; font-size:11px; color:var(--muted); margin-top:8px; line-height:1.55; }
.input.sm{ padding:7px 10px; font-size:12px; }

/* store cards */
.dbgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
.dbgrid .stcard{ padding:14px 14px 12px; cursor:default; }
.dbgrid .stcard[data-go]{ cursor:pointer; }
.dbgrid .stcard[data-go]:hover{ border-color:var(--acc); transform:translateY(-1px); }
.stcard .st-top{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.stcard .st-top svg{ width:16px; height:16px; color:var(--acc-d); flex:none; }
.stcard .st-name{ font-size:13.5px; font-weight:800; margin:0 0 3px; display:flex; gap:8px; align-items:baseline; flex-wrap:wrap; }
.stcard .st-stats{ display:flex; gap:14px; margin-top:10px; padding-top:9px; border-top:1px dashed var(--line); font-size:11px; color:var(--muted); align-items:baseline; flex-wrap:wrap; }
.stcard .st-stats .num{ color:var(--ink); font-size:13px; }
.stcard.off{ opacity:.55; filter:grayscale(.4); }
.stcard.off:hover{ transform:none; }

/* inline add-row form */
.dbform{ display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; align-items:center; }
.dbform .input{ flex:1 1 110px; min-width:90px; }
.dbform .btn{ flex:none; }
.btn.ghost-d{ background:transparent; border-color:transparent; }
.btn.ghost-d:hover{ border-color:var(--bad); background:var(--bad-bg); }

/* backup center */
.bk-pick{ display:flex; gap:8px; flex-wrap:wrap; }
.bk-chip{ display:inline-flex; align-items:center; gap:7px; padding:7px 11px; border:1px solid var(--line);
  border-radius:999px; background:var(--surface); font-size:12px; font-weight:650; cursor:pointer; user-select:none; }
.bk-chip:hover{ border-color:var(--acc); }
.bk-chip input{ accent-color:var(--acc-d); margin:0; }
.bk-chip span{ display:inline-flex; align-items:center; gap:6px; }
.bk-chip svg{ width:13px; height:13px; color:var(--acc-d); }
.bk-chip.off{ opacity:.5; cursor:not-allowed; }
.sc-on{ accent-color:var(--acc-d); width:15px; height:15px; }
select.sc-freq{ min-width:110px; }

/* registry block */
.reg{ background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:12px; line-height:1.8; white-space:pre-wrap; word-break:break-word; }

/* ============================================================
   v2.4.0.db.auth — the portal & identity surfaces (clean pastel)
   ============================================================ */
body[data-portal="1"]{overflow:hidden}
.login-stage{position:fixed;inset:0;z-index:40;overflow:auto;background:
  radial-gradient(880px 600px at 10% -10%, var(--hr-bg) 0%, transparent 58%),
  radial-gradient(760px 520px at 106% 18%, var(--ceo-bg) 0%, transparent 58%),
  radial-gradient(900px 680px at 46% 116%, var(--mgr-bg) 0%, transparent 60%),
  radial-gradient(620px 420px at 88% 96%, var(--staff-bg) 0%, transparent 55%),
  var(--canvas)}

/* card — paper over the pastel wash */
.login-wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:safe center;gap:14px;padding:clamp(16px,3vh,26px) clamp(12px,2.6vw,18px)}
.login-card{width:min(880px,100%);container:panel / inline-size;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.9);outline:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-lg);padding:clamp(15px,2.6cqi,22px) clamp(13px,2.6cqi,22px) clamp(13px,2.2cqi,18px)}
.login-card.narrow{width:min(430px,100%)}
.lg-head{display:flex;align-items:center;gap:11px;margin-bottom:14px;flex-wrap:wrap}
.lg-head .spacer{flex:1}
.logo-mark.lg{width:38px;height:38px;border-radius:11px;font-size:19px;display:inline-flex;align-items:center;justify-content:center;
  background:var(--brand);color:#fff;font-weight:800;box-shadow:0 6px 16px -8px var(--brand)}
.lg-word{font:800 16.5px/1.15 var(--display);color:var(--ink)}
.lg-word span{font-weight:600;color:var(--brand);font-size:13px}
.lg-sub{font-size:10.8px;color:var(--muted);font-weight:600;margin-top:1px}
.lg-note{display:flex;gap:8px;align-items:flex-start;border-radius:12px;padding:9px 11px;font-size:11.8px;font-weight:600;margin-bottom:12px}
.lg-note svg{width:15px;height:15px;flex:none;margin-top:1px}
.lg-note.bad{background:var(--bad-bg);color:var(--bad-text)}
.lg-note.ok{background:var(--ok-bg);color:var(--ok-text)}
.input.lg{height:42px;font-size:13.5px}
.btn.lgbtn{width:100%;height:42px;font-size:13px;justify-content:center;margin-top:2px}
.lg-links{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:11px;flex-wrap:wrap}
.lf-link{border:0;background:none;font:600 11.5px var(--font);color:var(--brand-deep);cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:3px 4px;border-radius:7px}
.lf-link:hover{background:var(--brand-bg)}
.lf-link svg{width:13px;height:13px}
.lg-who{display:flex;align-items:center;gap:11px;margin-bottom:13px;flex-wrap:wrap}
.lg-who b{font-size:13.5px}
.lg-scope{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap}
.lp-hint{font-size:11.5px;font-weight:600;color:var(--muted);margin:0 0 13px}

/* persona frames — demo account + password pre-filled, one click in */
.lp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,196px),1fr));gap:12px}
.lp-frame{position:relative;border:1px solid var(--pl);background:linear-gradient(180deg, var(--pb) 0%, var(--surface) 86%);
  border-radius:16px;padding:13px 13px 12px;display:flex;flex-direction:column;transition:var(--t)}
.lp-frame:hover{box-shadow:var(--sh)}
.lp-frame.focus{outline:2px solid var(--pc);outline-offset:1px;box-shadow:var(--sh)}
.lp-head{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.lp-head .swatch{width:30px;height:30px;border-radius:9px;background:var(--pc);color:#fff;display:inline-flex;align-items:center;justify-content:center;flex:none;box-shadow:0 5px 12px -6px var(--pc)}
.lp-head .swatch svg{width:16px;height:16px}
.lp-head b{display:block;font-size:13px;color:var(--pd)}
.lp-head span{display:block;font-size:9.8px;color:var(--muted);font-weight:600;margin-top:1px}
.lp-lock{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font:700 9.5px var(--font);color:var(--muted);
  border:1px dashed var(--line);background:var(--surface-2);border-radius:999px;padding:3px 8px}
.lp-lock svg{width:11px;height:11px}
.lp-l{font:700 9.8px var(--font);text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:7px 0 4px;display:block}
.lp-frame .input{height:33px;font-size:11.5px;width:100%}
.lp-frame select.input{font-family:var(--mono);font-size:10.8px}
.btn.lp-go{width:100%;justify-content:center;margin-top:11px;height:34px;font-size:12px;background:var(--pc);border-color:var(--pc)}
.btn.lp-go:hover{background:var(--pd);border-color:var(--pd)}

/* printed seed passwords (D4) + portal footer */
.login-foot{width:min(880px,100%);display:flex;flex-direction:column;gap:9px;align-items:center}
.seed-strip{width:100%;background:rgba(255,255,255,.8);border:1px dashed var(--line);border-radius:14px;padding:9px 13px;font-size:11px}
.seed-strip summary{cursor:pointer;font-weight:700;color:var(--ink-2);display:flex;align-items:center;gap:6px;list-style:none}
.seed-strip summary::-webkit-details-marker{display:none}
.seed-strip summary svg{width:13px;height:13px}
.seed-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:9px}
.seed-grid b{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.seed-grid .mono{font-size:10.3px;color:var(--ink-2);margin-top:2px}
.seed-grid .pwd{color:var(--brand-deep);font-weight:700;background:var(--brand-bg);border-radius:5px;padding:0 4px}
.lf-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;
  background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:999px;padding:5px 12px}
.lf-ver{font-size:9.8px;color:var(--muted);text-align:center}
.seg.sm button{padding:3px 9px;font-size:10.3px}
.lg-outbox{display:flex;flex-direction:column;gap:7px;max-height:52vh;overflow:auto;margin-bottom:12px}
.mailrow{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:8px 10px;background:var(--surface)}
.mailrow .rt{font-size:12px;font-weight:700}
.mailrow .rs{font-size:10.3px;color:var(--muted)}

/* password meter — live policy feedback (D3 min 8) */
.pw-meter{display:flex;align-items:center;gap:4px;margin-top:7px}
.pw-meter i{height:4px;flex:1;border-radius:3px;background:var(--line-2);transition:var(--t)}
.pw-meter span{font-size:10.3px;font-weight:600;color:var(--muted);margin-left:6px;white-space:nowrap}
.pw-meter[data-lv="1"] i:nth-child(-n+1){background:var(--bad)}
.pw-meter[data-lv="2"] i:nth-child(-n+2){background:var(--warn)}
.pw-meter[data-lv="3"] i:nth-child(-n+3){background:var(--ok)}
.pw-meter[data-lv="4"] i:nth-child(-n+4){background:var(--ok)}
.pw-meter[data-ok="false"] span{color:var(--bad-text)}

/* identity console & shared auth surfaces */
.row-acts{display:flex;gap:5px;justify-content:flex-end;flex-wrap:wrap}
.mailbody{font:500 11.5px/1.65 var(--mono);background:var(--surface-2);border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;white-space:pre-wrap;word-break:break-word;margin:0 0 8px}
.mailbody.lo{font-family:"Noto Sans Lao",var(--font);border-style:dashed}
.badge.scope-staff{background:var(--staff-bg);color:var(--staff-d)}
.badge.scope-manager{background:var(--mgr-bg);color:var(--mgr-d)}
.badge.scope-hr{background:var(--hr-bg);color:var(--hr-d)}
.badge.scope-ceo{background:var(--ceo-bg);color:var(--ceo-d)}
.badge.scope-sysadmin{background:var(--sys-bg);color:var(--sys-d)}
.avatar-btn.session{outline:2px solid var(--brand);outline-offset:1px}
.seg-logout{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:9px;
  border:1px solid var(--line);background:var(--surface);color:var(--bad);cursor:pointer;transition:var(--t)}
.seg-logout svg{width:15px;height:15px}
.seg-logout:hover{border-color:var(--bad);background:var(--bad-bg)}
.seg-login{display:inline-flex;align-items:center;gap:6px;height:30px;border-radius:9px;padding:0 11px;
  border:1px solid var(--brand);background:var(--brand);color:#fff;font:600 11.5px var(--font);cursor:pointer;transition:var(--t)}
.seg-login svg{width:13px;height:13px}
.seg-login:hover{background:var(--brand-deep);border-color:var(--brand-deep)}

/* frames thin their chrome when the PANEL narrows (no viewport involved) */
@container panel (max-width: 560px){
  .lp-frame{ padding:11px 11px 10px; }
  .lg-head .spacer{ flex:1 1 100%; height:0; }
}

/* landing-page sign-in section — the portal frames, below the persona cards */
.landing-auth{margin-top:30px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);
  box-shadow:var(--sh);padding:clamp(14px,2.4cqi,20px) clamp(12px,2.4cqi,20px) clamp(11px,2cqi,16px);container:content / inline-size}
.la-head{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.la-head h2{font:700 17px/1.2 var(--display);color:var(--ink);margin:2px 0 0;letter-spacing:-.01em}
.la-head .eyebrow{display:block;margin-bottom:2px}
.la-links{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.landing-auth .seed-strip{background:var(--surface-2)}
.la-session{display:flex;align-items:center;gap:13px;flex-wrap:wrap;border:1px solid var(--line);
  border-radius:14px;padding:13px 15px;background:var(--surface-2)}
.la-session b{font-size:13.5px}
.la-session .spacer{flex:1}
/* (narrow behaviour handled by the @container content rules above) */

/* front-door mode controls — visible wherever you are */
.seg.mode button[aria-pressed="true"]{ color:var(--brand-deep); }
.seg-login.off{ background:var(--surface); border:1px dashed var(--muted-2); color:var(--muted); }
.seg-login.off:hover{ background:var(--brand-bg); border-color:var(--brand); color:var(--brand-deep); }
.la-off{ display:flex; align-items:center; gap:13px; flex-wrap:wrap; border:1px dashed var(--line);
  border-radius:14px; padding:13px 15px; background:var(--surface-2); }
.la-off > svg{ width:22px; height:22px; color:var(--muted); flex:none; }
.la-off p{ flex:1 1 320px; min-width:0; line-height:1.6; }
.la-off .spacer{ flex:0; }
.la-foot{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:12px; padding-top:11px; border-top:1px dashed var(--line-2); }
.launch-meta .meta-act{ cursor:pointer; text-decoration:underline dotted; text-underline-offset:3px; }
.launch-meta .meta-act:hover{ color:var(--brand-deep); }

/* ============================================================
   v2.4.1.smbowner — Owner Edition extensions
   (multi-tenant switcher · two-tier owner nav · cockpit tiles ·
    meters · leveling pills · flow rails · KYC queue · resources)
   All built on the same tokens — Atelier Pastel, no drift.
   ============================================================ */

/* ---------- tenant switcher (topbar) ---------- */
.tenant-switch{ display:flex; align-items:center; gap:8px; border:1px solid var(--line); background:var(--surface);
  border-radius:99px; padding:4px 6px 4px 10px; min-width:0; box-shadow:var(--sh-sm); }
.tenant-switch .ts-mark{ width:22px; height:22px; border-radius:7px; background:var(--acc-bg); color:var(--acc-d);
  display:grid; place-items:center; font-size:10px; font-weight:800; flex:none; border:1px solid var(--acc-ln); }
.tenant-switch .ts-body{ display:flex; flex-direction:column; min-width:0; line-height:1.15; }
.tenant-switch .ts-lbl{ font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
.tenant-switch .ts-name{ font-size:12.5px; font-weight:700; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }
.tenant-switch select{ border:0; background:none; font:700 12.5px var(--font); color:var(--ink); cursor:pointer; padding:3px 2px; max-width:180px; }
.tenant-switch .ts-ico{ width:15px; height:15px; color:var(--muted); flex:none; }
.tenant-switch.platform{ border-style:dashed; }
@container topbar (max-width: 820px){ .tenant-switch .ts-body .ts-lbl{ display:none; } }

/* ---------- two-tier owner shell: section rail + contextual sub-nav ---------- */
.shell.two-tier{ display:flex; }
.sectionrail{
  width:84px; flex:none; border-right:1px solid var(--line); background:var(--surface-2);
  padding:16px 8px; display:flex; flex-direction:column; gap:4px;
  position:sticky; top:58px; height:calc(100vh - 58px); overflow-y:auto;
}
.sectionrail .sr-head{ display:grid; place-items:center; padding:6px 0 12px; margin-bottom:6px; border-bottom:1px solid var(--line-2); }
.sectionrail .sr-head .pin{ width:34px; height:34px; border-radius:11px; background:var(--acc-bg); border:1px solid var(--acc-ln); display:grid; place-items:center; color:var(--acc-d); }
.sectionrail .sr-head .pin svg{ width:16px; height:16px; }
.sec-item{
  display:flex; flex-direction:column; align-items:center; gap:4px; width:100%; border:0; background:transparent;
  padding:9px 4px; border-radius:12px; color:var(--ink-2); position:relative; transition:background var(--t), color var(--t);
}
.sec-item svg{ width:19px; height:19px; opacity:.8; }
.sec-item .sl{ font-size:9.3px; font-weight:700; letter-spacing:.01em; text-align:center; line-height:1.15; }
.sec-item:hover{ background:var(--line-2); color:var(--ink); }
.sec-item[aria-current="true"]{ background:var(--acc-bg); color:var(--acc-d); }
.sec-item[aria-current="true"] svg{ opacity:1; }
.sec-item[aria-current="true"]::before{ content:""; position:absolute; left:-8px; top:9px; bottom:9px; width:3px; border-radius:0 3px 3px 0; background:var(--acc); }
.sec-item .count{ position:absolute; top:5px; right:12px; font-size:9px; font-weight:800; font-family:var(--mono);
  background:var(--acc); color:#fff; padding:0 5px; border-radius:99px; min-width:15px; text-align:center; line-height:15px; }

.subrail{
  width:208px; flex:none; border-right:1px solid var(--line); padding:18px 12px 16px;
  display:flex; flex-direction:column; gap:3px; position:sticky; top:58px; height:calc(100vh - 58px); overflow-y:auto;
  background:color-mix(in srgb, var(--surface) 40%, var(--canvas));
}
.subrail .sub-head{ padding:6px 10px 12px; margin-bottom:4px; border-bottom:1px solid var(--line-2); }
.subrail .sub-head .st{ font-size:13.5px; font-weight:800; letter-spacing:-.01em; color:var(--ink); }
.subrail .sub-head .ss{ font-size:11px; color:var(--muted); margin-top:2px; }
.subrail .sub-foot{ margin-top:auto; padding:12px 10px 2px; border-top:1px solid var(--line-2); font-size:10.5px; color:var(--muted); line-height:1.5; }
/* sub-nav items reuse .nav-item look */
@container shell (max-width: 1080px){
  .subrail{ width:74px; }
  .subrail .sub-head .ss, .subrail .nav-item span.lbl, .subrail .sub-foot{ display:none; }
  .subrail .sub-head{ text-align:center; }
  .subrail .nav-item{ justify-content:center; }
}
@container shell (max-width: 760px){
  .sectionrail .sec-item .sl{ display:none; }
  .sectionrail{ width:60px; }
}

/* ---------- cockpit tiles (owner dashboard) ---------- */
.tilegrid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(min(100%,210px),1fr)); gap:clamp(10px,1.6cqi,15px); }
.tile{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:17px 19px; box-shadow:var(--sh-sm);
  display:flex; flex-direction:column; gap:7px; min-width:0; container-type:inline-size; }
.tile.accent{ background:linear-gradient(160deg, var(--acc-bg) 0%, var(--surface) 72%); border-color:var(--acc-ln); }
.tile[data-go]{ cursor:pointer; transition:transform var(--t), box-shadow var(--t), border-color var(--t); }
.tile[data-go]:hover{ transform:translateY(-2px); box-shadow:var(--sh); border-color:var(--acc-ln); }
.tile .tl-label{ font-size:10.8px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
  display:flex; align-items:center; gap:7px; }
.tile .tl-label svg{ width:14px; height:14px; color:var(--acc-d); flex:none; }
.tile .tl-value{ font-family:var(--display); font-size:27px; font-weight:550; letter-spacing:-.03em; line-height:1.05; }
.tile .tl-value small{ font-size:13px; font-weight:600; color:var(--muted); letter-spacing:0; }
.tile .tl-sub{ font-size:11.5px; color:var(--muted); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }

/* ---------- meter ---------- */
.meter{ height:8px; border-radius:99px; background:var(--line-2); overflow:hidden; }
.meter i{ display:block; height:100%; border-radius:99px; background:var(--acc); transition:width .5s var(--ease); }
.meter i.ok{ background:var(--ok); } .meter i.warn{ background:var(--warn); } .meter i.bad{ background:var(--bad); }
.segmeter{ display:flex; flex-direction:column; gap:6px; }
.segmeter .sm-top{ display:flex; justify-content:space-between; align-items:baseline; font-size:11.5px; font-weight:600; color:var(--ink-2); }
.segmeter .sm-top .mono{ color:var(--muted); }

/* capacity strip row (dashboard) */
.capstrip{ display:grid; grid-template-columns:repeat(auto-fit,minmax(min(100%,180px),1fr)); gap:16px; }

/* ---------- leveling pills (payroll L0–L3) ---------- */
.lvlpill{ display:inline-block; font-size:11px; font-weight:700; border-radius:99px; padding:3px 11px; white-space:nowrap; }
.lvlpill.l0{ background:var(--line-2); color:var(--muted); }
.lvlpill.l1{ background:var(--staff-bg); color:var(--staff-d); }
.lvlpill.l2{ background:var(--hr-bg); color:var(--hr-d); }
.lvlpill.l3{ background:var(--ceo-bg); color:var(--ceo-d); }
.lvlpill.on{ box-shadow:0 0 0 2px var(--surface), 0 0 0 3.5px currentColor; }
.lvl-track{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

/* ---------- flow rail (lifecycle / KYC / pipeline) ---------- */
.flowrail{ display:flex; flex-wrap:wrap; gap:0; align-items:stretch; counter-reset:fr; border-radius:var(--r-sm); overflow:hidden; border:1px solid var(--line); }
.flowrail .fr-st{ flex:1 1 130px; min-width:120px; background:var(--surface); padding:12px 13px; counter-increment:fr; border-left:1px solid var(--line-2); }
.flowrail .fr-st:first-child{ border-left:0; }
.flowrail .fr-st::before{ content:counter(fr,decimal-leading-zero); font-family:var(--mono); font-size:10px; font-weight:600; color:var(--acc-d); background:var(--acc-bg); border-radius:6px; padding:1.5px 6px; }
.flowrail .fr-h{ font-size:12.5px; font-weight:700; margin:8px 0 3px; }
.flowrail .fr-p{ font-size:11px; color:var(--muted); line-height:1.5; }

/* ---------- KYC review (platform) ---------- */
.kyc-review{ display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:14px; }
@container content (max-width: 620px){ .kyc-review{ grid-template-columns:1fr; } }
.kyc-doc{ border:1px solid var(--line); border-radius:14px; background:var(--surface-2); overflow:hidden; }
.kyc-doc .kd-head{ display:flex; align-items:center; gap:8px; padding:9px 12px; background:var(--surface); border-bottom:1px solid var(--line);
  font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); }
.kyc-doc .kd-head svg{ width:14px; height:14px; color:var(--acc-d); }
.kyc-img{ aspect-ratio:16/10; display:grid; place-items:center; background:
  repeating-linear-gradient(45deg, var(--line-2) 0 10px, var(--surface-2) 10px 20px); color:var(--muted); position:relative; }
.kyc-img .kdesc{ position:absolute; bottom:8px; left:8px; right:8px; background:rgba(255,255,255,.86); border-radius:8px;
  padding:5px 9px; font-size:10.5px; font-weight:600; color:var(--ink-2); backdrop-filter:blur(3px); }
.kyc-img svg{ width:34px; height:34px; opacity:.55; }
.kyc-meta{ display:flex; flex-direction:column; gap:9px; }
.kyc-fact{ display:flex; align-items:center; gap:9px; font-size:12.5px; }
.kyc-fact svg{ width:15px; height:15px; color:var(--muted); flex:none; }
.kyc-fact b{ font-weight:700; }

/* ---------- resource / allocation table meters ---------- */
.res-meter{ display:flex; align-items:center; gap:9px; min-width:120px; }
.res-meter .meter{ flex:1; min-width:60px; }
.res-meter .mono{ font-size:11px; color:var(--muted); white-space:nowrap; }

/* boundary note (privacy plane / sealed) */
.seal-note{ display:flex; gap:10px; align-items:flex-start; border-left:3px solid var(--warn); background:var(--warn-bg);
  border-radius:0 12px 12px 0; padding:11px 14px; font-size:12.3px; color:var(--warn-text); line-height:1.55; }
.seal-note svg{ width:16px; height:16px; flex:none; margin-top:1px; }
.seal-note.ok{ border-left-color:var(--ok); background:var(--ok-bg); color:var(--ok-text); }
.seal-note.brand{ border-left-color:var(--brand); background:var(--brand-bg); color:var(--ink-2); }

/* split CAN / CANNOT panel */
.cancan{ display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:0; border:1px solid var(--line); border-radius:14px; overflow:hidden; }
@container content (max-width: 560px){ .cancan{ grid-template-columns:1fr; } }
.cancan > div{ padding:14px 16px; min-width:0; }
.cancan .rowitem{ align-items:flex-start; }
.cancan .ric{ margin-top:1px; }
.cancan > div + div{ border-left:1px solid var(--line); }
@container content (max-width: 560px){ .cancan > div + div{ border-left:0; border-top:1px solid var(--line); } }
.cancan .cc-h{ font-size:11.5px; font-weight:800; display:flex; align-items:center; gap:7px; margin-bottom:9px; }

/* worked-payslip / reconcile table emphasis */
.tbl tr.total td{ border-top:1.5px solid var(--line); font-weight:800; background:var(--surface-2); }
.tbl td.pos{ color:var(--ok-text); font-weight:700; }
.tbl td.neg{ color:var(--bad-text); font-weight:700; }

/* "later / pending" affordance (LINE·WhatsApp accounts under registration, Lao pack) */
.pending-chip{ display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:800; letter-spacing:.06em;
  text-transform:uppercase; color:var(--muted); background:var(--surface-2); border:1px dashed var(--muted-2); border-radius:99px; padding:3px 9px; }
.pending-chip svg{ width:11px; height:11px; }

/* section intro band (used atop owner sub-sections) */
.intro-band{ display:flex; align-items:center; gap:14px; padding:14px 18px; border-radius:14px; margin-bottom:20px;
  background:linear-gradient(150deg, var(--acc-bg) 0%, var(--surface-2) 80%); border:1px solid var(--acc-ln); }
.intro-band .ib-ic{ width:38px; height:38px; border-radius:12px; background:var(--surface); border:1px solid var(--acc-ln);
  display:grid; place-items:center; color:var(--acc-d); flex:none; }
.intro-band .ib-ic svg{ width:19px; height:19px; }
.intro-band .ib-t{ font-size:13.5px; font-weight:700; }
.intro-band .ib-s{ font-size:12px; color:var(--muted); margin-top:1px; }

/* mini stat inline (sub-headers) */
.statline{ display:flex; gap:22px; flex-wrap:wrap; margin:2px 0 18px; }
.statline .sl-it{ display:flex; flex-direction:column; gap:1px; }
.statline .sl-v{ font-family:var(--display); font-size:19px; font-weight:600; letter-spacing:-.02em; }
.statline .sl-l{ font-size:11px; color:var(--muted); font-weight:600; }

/* inline mobile tab count (no absolute positioning → never overlaps the label) */
.tab .tab-cnt{ font-family:var(--mono); font-size:8.5px; font-weight:800; background:var(--acc); color:#fff; border-radius:99px; padding:0 4px; vertical-align:1.5px; }

/* ---- text-frame safety: row titles WRAP, never hard-clip in narrow columns ----
   (overrides the carried nowrap+ellipsis on .rt; subtitles keep ellipsis) */
.rowitem .rt{ white-space:normal; overflow:visible; text-overflow:clip; overflow-wrap:break-word; }
.cancan .rt{ line-height:1.3; }
.cancan .ric{ width:30px; height:30px; }
/* keep right-aligned row sides from being squeezed to nothing */
.rowitem .rside{ flex-wrap:wrap; justify-content:flex-end; }


</style>

})();

/* ============================================================

    r.history.push({ to: "close (one-tap)", at: "2026-06-15" });

/* ============================================================
   ADEPTIO · cashbook ledger — BO-6

   auto-post on payroll close (Salaries + Employer NSSF, locked) ·

window.LEDGER = (function () {
  const store = {};
  let view = "month"; // day | week | month

  function init(tid) {
    if (!store[tid]) {
      store[tid] = (DATA.LEDGER[tid] || []).map((e, i) => Object.assign({ id: "L" + tid + i, tenant: tid, source: "manual", locked: false }, e));
    }

  }
  const all = (tid) => init(tid).slice().sort((a, b) => a.date < b.date ? 1 : a.date > b.date ? -1 : 0);

  function add(tid, e) {

    DATA.AUDIT.unshift({ fact: "ledger.added", who: "Owner", when: "2026-06-15", ref: (e.kind === "rev" ? "+" : "−") + UI.kip(e.amount).replace("₭ ", "") });

  }

    if (v === "month") return date >= "2026-06-01" && date <= "2026-06-30";
    if (v === "week") return date >= "2026-06-09";
    return date >= "2026-06-14"; // day (latest)
  }

    const rev = list.filter(e => e.kind === "rev").reduce((s, e) => s + e.amount, 0);
    const exp = list.filter(e => e.kind === "exp").reduce((s, e) => s + e.amount, 0);
    return { rev, exp, net: rev - exp, count: list.length };

    const list = all(tid);

    const otherExp = list.filter(e => e.kind === "exp" && e.source !== "payroll").reduce((s, e) => s + e.amount, 0);

})();

        live: i === MONTHS.length - 1

    });
  }

  // one workbook — a tab (CSV section) per report
  function workbook(tid) {
    tid = tid || DATA.state.tenantId;
    const t = DATA.byId(tid), cur = monthly(tid), ser = series(tid), run = PAYROLL.computeRun(tid);
    const S = (a) => a.map(r => r.map(c => /[",\n]/.test(String(c)) ? '"' + String(c).replace(/"/g, '""') + '"' : c).join(",")).join("\n");
    const out = [];
    out.push("# " + t.name + " — Adeptio workbook (" + run.period + ", level " + run.level + ")");
    out.push("\n=== Sheet: P&L-lite ===\n" + S([
      ["Line", "LAK"], ["Revenue", cur.revenue], ["Staff cost", -cur.staffCost],
      ["Other expenses", -cur.otherExp], ["Channel fees", -cur.channelFee], ["Operating result", cur.result],
      ["Margin %", Math.round(cur.margin * 100)], ["Staff / revenue %", Math.round(cur.staffRatio * 100)], ["Cost per head", cur.costPerHead]
    ]));
    out.push("\n=== Sheet: Revenue vs staff cost (6 mo) ===\n" + S(
      [["Month", "Revenue", "StaffCost", "OtherExp", "Result"]].concat(ser.map(s => [s.month, s.revenue, s.staffCost, s.otherExp, s.result]))));
    out.push("\n=== Sheet: Margin & cost-per-head ===\n" + S(
      [["Month", "Margin%", "CostPerHead"]].concat(ser.map(s => [s.month, Math.round(s.margin * 100), s.costPerHead]))));
    out.push("\n=== Sheet: Payroll register ===\n" + S(
      [["Employee", "Role", "Gross", "NSSF_ee", "NSSF_er", "Taxable", "PIT", "Net", "Cost"]]
        .concat(run.slips.map(s => [s.name, s.role, s.gross, s.ssEmp, s.ssEr, s.taxable, s.pit, s.net, s.cost]))
        .concat([["TOTAL", "", run.totals.gross, run.totals.ssEmp, run.totals.ssEr, "", run.totals.pit, run.totals.net, run.totals.cost]])));
    out.push("\n=== Sheet: Cashbook ===\n" + LEDGER.toCSV(tid));
    return out.join("\n");
  }

  return { monthly, series, workbook };
})();

    ["identity", "Identity · access & security"], ["audit", "Audit log + backup"]
  ];

    tid = tid || DATA.state.tenantId;
    if (!state[tid]) { state[tid] = {}; ORDER.forEach(k => state[tid][k] = REGISTRY[k].def); }
    return state[tid];
  }
  function on(tid, feature) { return REGISTRY[feature] ? !!f(tid)[feature] : true; }
  function set(tid, feature, val, callerScope) {
    const reg = REGISTRY[feature];
    if (!reg) return { ok: false, err: "Unknown feature." };
    if (reg.scope === "owner" && callerScope === "manager") return { ok: false, err: "Owner-only flag — a manager can't change this." };

    DATA.AUDIT.unshift({ fact: "flag.set", who: callerScope === "manager" ? "Manager" : "Owner", when: "2026-06-15", ref: feature + " = " + (val ? "on" : "off") });

  // screen ids to hide for a persona because their feature is off (data retained underneath)
  function hiddenScreens(tid, persona) {

    return s;
  }
  function __reset() { for (const k in state) delete state[k]; }

  return { REGISTRY, ORDER, CORE, on, set, hiddenScreens, __reset };
})();

/* ============================================================
   ADEPTIO · approval engine — BO-26
   ONE primitive behind every §A flow: request → checks → decision
   → outcome + audit. Worker-protecting checks (geofence/OT/punch)
   set grade = flag — they never block, they route to review.
   A new approvable type is config (register), not new code.
   ============================================================ */
window.APPROVALS = (function () {
  const TYPES = {
    leave:    { label: "Leave request", scope: "owner", protective: false, check: "balance" },
    ot:       { label: "Overtime", scope: "owner", protective: true, check: "≤3h/day · ≤45h/mo" },
    swap:     { label: "Shift swap", scope: "owner", protective: true, check: "OT guardrail" },
    claim:    { label: "Open-shift claim", scope: "owner", protective: true, check: "OT guardrail" },
    punchfix: { label: "Punch / geofence", scope: "owner", protective: true, check: "geofence" },
    ewa:      { label: "Earned-wage access", scope: "owner", protective: false, check: "≤50% earned-to-date" },
    expense:  { label: "Expense / cash entry", scope: "owner", protective: false, check: "policy" }
  };
  const seed = () => ([
    { id: "AP-245", type: "claim", who: "Noy Phaketh", detail: "Open shift · Wed", grade: "ok", state: "pending" },
    { id: "AP-244", type: "ot", who: "Khamphan Sayasith", detail: "OT 4h · within cap", grade: "ok", state: "pending" },
    { id: "AP-243", type: "swap", who: "Khamla → Souphaphone", detail: "Thu 18 · OT ok", grade: "ok", state: "pending" },
    { id: "AP-242", type: "punchfix", who: "Daophet Many", detail: "Clock-in 50 m out · weak GPS", grade: "flag", state: "pending" },
    { id: "AP-241", type: "leave", who: "Souphaphone Keo", detail: "Annual · 2 days · 18 Jun", grade: "ok", state: "pending" }
  ]);
  const store = {};
  function box(tid) { tid = tid || DATA.state.tenantId; if (!store[tid]) store[tid] = (tid === "phoungern" ? seed() : []); return store[tid]; }
  const inbox = (tid) => box(tid).filter(i => i.state === "pending");
  const pending = (tid) => inbox(tid).length;
  const get = (tid, id) => box(tid).find(i => i.id === id);

  function decide(tid, id, decision, reason) {
    const it = get(tid, id);
    if (!it || it.state !== "pending") return { ok: false };
    it.state = decision; it.reason = reason || "";
    DATA.AUDIT.unshift({ fact: "approve." + it.type, who: "Owner", when: "2026-06-15", ref: id + " · " + decision });
    return { ok: true, it };
  }
  // request → run checks; a failed PROTECTIVE check flags (never blocks); others may auto-reject
  function request(tid, type, payload) {
    const t = TYPES[type] || {};
    payload = payload || {};
    const failed = !!payload.fails;
    const grade = (t.protective && failed) ? "flag" : "ok";
    const it = { id: "AP-" + Date.now(), type, who: payload.who || "—", detail: payload.detail || "", grade, state: "pending" };
    box(tid).unshift(it);
    DATA.AUDIT.unshift({ fact: "approve.request", who: "system", when: "2026-06-15", ref: type + (grade === "flag" ? " · flagged (not blocked)" : "") });
    return it;
  }
  function register(def) {
    TYPES[def.key] = { label: def.label, scope: def.scope || "owner", protective: !!def.protective, check: def.check || "—" };
    DATA.AUDIT.unshift({ fact: "approve.type_registered", who: "Owner", when: "2026-06-15", ref: def.key });
    return TYPES[def.key];
  }
  function __reset() { for (const k in store) delete store[k]; }

  return { TYPES, inbox, pending, get, decide, request, register, __reset };
})();

/* ============================================================
   ADEPTIO · per-tenant DB ops — BO-25
   Owner controls their OWN slice (backup/restore/export, scoped to
   tenant_id). Platform Admin acts on ANY one tenant at a time —
   a snapshot is taken automatically before any destructive op, and
   every op is audited (platform.db.*). Demo: in-memory snapshots.
   ============================================================ */
window.DBOPS = (function () {
  const bk = {}; // tid → [{id, at, scope, kind, reason}]
  function list(tid) {
    tid = tid || DATA.state.tenantId;
    if (!bk[tid]) bk[tid] = [{ id: "BK-0001", at: "2026-06-14 02:00", scope: "all", kind: "scheduled" }];
    return bk[tid];
  }
  const add = (tid, o) => { list(tid).unshift(Object.assign({ id: "BK-" + Date.now(), at: "2026-06-15 16:50" }, o)); };

  // ---- owner (own tenant) ----
  function backup(tid, scope) { add(tid, { scope: scope || "now", kind: "backup" }); DATA.AUDIT.unshift({ fact: "db.backup", who: "Owner", when: "2026-06-15", ref: scope || "now" }); }
  function restore(tid, id) { DATA.AUDIT.unshift({ fact: "db.restore", who: "Owner", when: "2026-06-15", ref: id }); return { ok: true }; }
  function snapshot(tid) { add(tid, { scope: "all", kind: "snapshot" }); }

  // ---- platform (any tenant, one at a time) — auto-snapshot before destructive ----
  function platformOp(tid, op, reason) {
    snapshot(tid); // safety snapshot precedes every op
    DATA.AUDIT.unshift({ fact: "platform.db." + op, who: "Platform", when: "2026-06-15", ref: tid + " · " + (reason || "no reason given") });
    return { ok: true, snapshot: list(tid)[0] };
  }
  function __reset() { for (const k in bk) delete bk[k]; }

  return { list, backup, restore, snapshot, platformOp, __reset };
})();

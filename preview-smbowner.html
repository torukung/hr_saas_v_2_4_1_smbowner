.tcal-c.leave.pending{ background:var(--acc-bg); color:var(--acc-d); background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 6px); }
.tcal-c.sick{ background:var(--cal-sick-bg); color:var(--cal-sick-fg); }
.tcal-c.split{ background:var(--cal-split-bg); color:var(--cal-split-fg); }
.tcal-c.take{ background:var(--cal-take-bg); color:var(--cal-take-fg); }
.tcal-c.holiday{ background:var(--cal-hol-bg); color:var(--cal-hol-fg); }
.tcal-legendrow{ display:flex; flex-wrap:wrap; gap:9px 14px; margin-top:12px; }
.tcal-key{ display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); font-weight:600; }
.tcal-sw{ width:13px; height:13px; border-radius:4px; border:1px solid var(--line); flex:none; }
.tcal-sw.work{ background:var(--cal-work-bg); }
.tcal-sw.off{ background:var(--cal-off-bg); }
.tcal-sw.leave{ background:var(--acc); border-color:var(--acc); }
.tcal-sw.sick{ background:var(--cal-sick-bg); border-color:var(--cal-sick-bg); }
.tcal-sw.split{ background:var(--cal-split-bg); border-color:var(--cal-split-bg); }
.tcal-sw.take{ background:var(--cal-take-bg); border-color:var(--cal-take-bg); }
.tcal-sw.holiday{ background:var(--cal-hol-bg); border-color:var(--cal-hol-bg); }
.tcal-sw.pending{ background:var(--acc-bg); border-color:var(--acc-ln); background-image:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px); }

/* ---------- click-a-date affordance + day-summary popup ---------- */
.tcal-dh.clickable, .tcal-c.clickable{ cursor:pointer; }
.tcal-dh.clickable:hover{ background:var(--acc-bg); }
.tcal-dh.clickable:hover .tcal-dn{ color:var(--acc-d); }
.tcal-dh.sel{ background:var(--acc); outline:none; }
.tcal-dh.sel .tcal-dow, .tcal-dh.sel .tcal-dn{ color:#fff; }
.tcal-c.clickable:hover{ filter:brightness(.96); }
.tcal-c.sel{ box-shadow:inset 0 0 0 2px var(--acc); position:relative; z-index:1; }
.tcal-dh.clickable:focus-visible, .tcal-c.clickable:focus-visible{ outline:2px solid var(--acc-d); outline-offset:-2px; }

.dp-backdrop{ position:fixed; inset:0; z-index:150; background:rgba(40,38,33,.34);

/* ---- attendance fix-request modal ---- */
.fix-list{ display:flex; flex-direction:column; gap:6px; max-height:240px; overflow-y:auto; }
.fix-row{ display:flex; align-items:center; gap:10px; padding:9px 11px; border:1px solid var(--line); border-radius:11px; background:var(--surface-2); cursor:pointer; }
.fix-row.on{ border-color:var(--acc); background:var(--acc-bg); box-shadow:inset 0 0 0 1px var(--acc); }
.fix-row input[type="radio"]{ accent-color:var(--acc-d); width:15px; height:15px; flex:none; }
.fix-d{ font-size:12.5px; font-weight:650; color:var(--ink); flex:none; min-width:92px; }
.fix-lbl{ margin-left:auto; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ---- payslip "Top 3" frame ---- */
.pay-top3{ align-items:stretch; }
.card.pt-cur{ border-color:var(--acc-ln); background:linear-gradient(180deg,var(--acc-bg),var(--surface) 90%); }
.pt-hero{ display:flex; flex-direction:column; gap:2px; margin-bottom:10px; }
.pt-lbl{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
.pt-val{ font-family:var(--display); font-size:22px; font-weight:750; color:var(--ink); line-height:1.1; }
.pt-sub{ font-size:11.5px; color:var(--muted); }
.pt-lines{ display:flex; flex-direction:column; gap:5px; padding-top:10px; border-top:1px dashed var(--line); }
.pt-li{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; font-size:12.5px; }
.pt-li span:first-child{ color:var(--ink-2); }
.pt-li .num{ font-weight:650; color:var(--ink); }

      <span class="k-value num">${value}</span>
      ${sub ? `<span class="k-sub">${sub}</span>` : ""}
    </div>`;
  }

    const head = title ? `<div class="card-head">
        <span class="t">${opts.icon ? icon(opts.icon) : ""}${esc(title)}</span>
        ${opts.link ? `<button class="link" data-go="${opts.link}">${esc(opts.linkLabel || t("common.viewAll"))} ${icon("chevR")}</button>` : ""}
        ${opts.badge || ""}

    return `<div class="card ${opts.cls || ""}" ${opts.span ? `style="grid-column:span ${opts.span}"` : ""}>${head}${body}</div>`;
  }

  function badge(status) {
    const map = {
      approved: ["ok", "Approved"], ok: ["ok", "OK"], live: ["ok", "Live"], active: ["ok", "Active"],
      published: ["ok", "Published"], disbursed: ["ok", "Disbursed"], present: ["ok", "Present"],
      pending: ["warn", "Pending"], draft: ["warn", "Draft"], review: ["warn", "In review"],
      late: ["warn", "Late"], expiring: ["warn", "Expiring"], onleave: ["", "On leave"],
      returned: ["bad", "Returned"], failed: ["bad", "Failed"], absent: ["bad", "Absent"],
      flagged: ["bad", "Flagged"], readonly: ["acc", "Read-only"]
    };
    const [cls, label] = map[status] || ["", status];
    return `<span class="badge ${cls}">${esc(label)}</span>`;
  }

  }
  const rowlist = (items) => `<div class="rowlist">${items.join("")}</div>`;

    if (v === "month") return date >= "2026-06-01" && date <= "2026-06-30";
    if (v === "week") return date >= "2026-06-09";

  function sums(list) {
    const rev = list.filter(e => e.kind === "rev").reduce((s, e) => s + e.amount, 0);
    const exp = list.filter(e => e.kind === "exp").reduce((s, e) => s + e.amount, 0);

  const getView = () => view;

  // monthly P&L — REPLAYED: revenue + other-expense from the cashbook, staff cost LIVE from payroll
  function rollup(tid) {
    tid = tid || DATA.state.tenantId;
    const list = all(tid);
    const revenue = list.filter(e => e.kind === "rev").reduce((s, e) => s + e.amount, 0);
    const otherExp = list.filter(e => e.kind === "exp" && e.source !== "payroll").reduce((s, e) => s + e.amount, 0);
    const channelFee = ((DATA.byId(tid) || {}).month || {}).channelFee || 0;
    const run = PAYROLL.computeRun(tid);
    const staffCost = run.totals.cost;
    const result = revenue - staffCost - otherExp - channelFee;
    return {
      revenue, staffCost, otherExp, channelFee,
      result, margin: revenue ? result / revenue : 0,
      staffRatio: revenue ? staffCost / revenue : 0,

  }

  // ---- recurring / scheduled expenses (waiting to be posted to the cashbook) ----
  const recur = {};
  function initRecur(tid) {
    if (!recur[tid]) recur[tid] = (DATA.RECUR_EXPENSES[tid] || []).map((e, i) => Object.assign({ id: "RX" + tid + i, tenant: tid, posted: false }, e));
    return recur[tid];
  }
  const recurring = (tid) => initRecur(tid).slice().sort((a, b) => a.next < b.next ? -1 : a.next > b.next ? 1 : 0);
  function advance(iso, freq) {
    const d = new Date(iso);
    if (freq === "weekly") d.setDate(d.getDate() + 7);
    else if (freq === "yearly") d.setFullYear(d.getFullYear() + 1);
    else d.setMonth(d.getMonth() + 1);
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");

    const r = initRecur(tid).find(x => x.id === id); if (!r) return { ok: false };
    const today = (window.CAL && CAL.TODAY) || "2026-06-16";
    add(tid, { date: today, kind: "exp", cat: r.cat, amount: r.amount, method: r.method || "transfer", tax: r.tax || "exempt" });
    r.next = advance(r.next, r.freq);
    DATA.AUDIT.unshift({ fact: "expense.posted", who: "Owner", when: today + " 09:30", ref: r.name + " · " + UI.kip(r.amount).replace("₭ ", "") + " (" + r.freq + ")" });
    return { ok: true, r };
  }
  function setRecurringFreq(tid, id, freq) {

    r.freq = freq;

  }
  function addRecurring(tid, obj) {
    if (!obj || !obj.name || !obj.amount) return { ok: false, err: "Name and amount are required" };
    initRecur(tid);
    recur[tid].unshift(Object.assign({ id: "RX" + Date.now(), tenant: tid, posted: false, next: "2026-07-01", method: "transfer", tax: "exempt", cat: obj.name }, obj));
    DATA.AUDIT.unshift({ fact: "expense.scheduled", who: "Owner", when: "2026-06-16 09:30", ref: obj.name + " · " + (obj.freq || "monthly") });

      .concat(all(tid).map(e => [e.date, e.kind, e.cat, e.method, e.amount, e.source]));

  return { init, all, add, postFromRun, ranged, sums, rollup, toCSV, setView, getView, hasPayrollLines, topExpenses, recurring, postRecurring, setRecurringFreq, addRecurring, __reset };
})();

/* ============================================================
   ADEPTIO · dw_reports projector — BO-8
   DERIVED reporting layer: rebuilds the cost/benefit picture by
   replay from the operational stores — revenue + other-expense
   from the cashbook (LEDGER), staff cost from payroll (PAYROLL).
   Nothing here is a source of truth; it can be rebuilt any time.
   ============================================================ */
window.DW = (function () {
  // canonical month rollup (the BO-8 formula) — current live month
  function monthly(tid) {
    tid = tid || DATA.state.tenantId;
    const r = LEDGER.rollup(tid);
    r.headcount = PAYROLL.computeRun(tid).totals.headcount;
    return r;
  }

  // 6-month series — past months derived from the live month by a ramp; June = live exact.
  const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun"];
  const RAMP = [0.86, 0.90, 0.94, 0.97, 0.99, 1.00];
  function series(tid) {
    tid = tid || DATA.state.tenantId;
    const cur = monthly(tid);
    return MONTHS.map((m, i) => {
      const f = RAMP[i];
      const revenue = Math.round(cur.revenue * f);
      const staffCost = Math.round(cur.staffCost * f);
      const otherExp = Math.round(cur.otherExp * f);
      const result = revenue - staffCost - otherExp - cur.channelFee;
      return {
        month: m, revenue, staffCost, otherExp, result,
        margin: revenue ? result / revenue : 0,
        costPerHead: cur.headcount ? Math.round(staffCost / cur.headcount) : 0,
        live: i === MONTHS.length - 1
      };
    });
  }

  // one workbook — a tab (CSV section) per report
  function workbook(tid) {
    tid = tid || DATA.state.tenantId;
    const t = DATA.byId(tid), cur = monthly(tid), ser = series(tid), run = PAYROLL.computeRun(tid);
    const S = (a) => a.map(r => r.map(c => /[",\n]/.test(String(c)) ? '"' + String(c).replace(/"/g, '""') + '"' : c).join(",")).join("\n");
    const out = [];
    out.push("# " + t.name + " — Adeptio workbook (" + run.period + ", level " + run.level + ")");
    out.push("\n=== Sheet: P&L-lite ===\n" + S([
      ["Line", "LAK"], ["Revenue", cur.revenue], ["Staff cost", -cur.staffCost],
      ["Other expenses", -cur.otherExp], ["Channel fees", -cur.channelFee], ["Operating result", cur.result],
      ["Margin %", Math.round(cur.margin * 100)], ["Staff / revenue %", Math.round(cur.staffRatio * 100)], ["Cost per head", cur.costPerHead]
    ]));
    out.push("\n=== Sheet: Revenue vs staff cost (6 mo) ===\n" + S(
      [["Month", "Revenue", "StaffCost", "OtherExp", "Result"]].concat(ser.map(s => [s.month, s.revenue, s.staffCost, s.otherExp, s.result]))));
    out.push("\n=== Sheet: Margin & cost-per-head ===\n" + S(
      [["Month", "Margin%", "CostPerHead"]].concat(ser.map(s => [s.month, Math.round(s.margin * 100), s.costPerHead]))));
    out.push("\n=== Sheet: Payroll register ===\n" + S(
      [["Employee", "Role", "Gross", "NSSF_ee", "NSSF_er", "Taxable", "PIT", "Net", "Cost"]]
        .concat(run.slips.map(s => [s.name, s.role, s.gross, s.ssEmp, s.ssEr, s.taxable, s.pit, s.net, s.cost]))
        .concat([["TOTAL", "", run.totals.gross, run.totals.ssEmp, run.totals.ssEr, "", run.totals.pit, run.totals.net, run.totals.cost]])));
    out.push("\n=== Sheet: Cashbook ===\n" + LEDGER.toCSV(tid));
    return out.join("\n");
  }

  return { monthly, series, workbook };
})();

    const detail = "Swap " + ds.map(fmt).join(", ") + " → " + (toName || "open shift") + (note ? " · “" + note + "”" : "");
    const rec = { id: "SW-" + (state.swaps.length + 1), tid, uid, who: me.name, dates: ds, to: toName || "open shift", note: note || "", state: "pending" };

  /* ============================================================

  function mgrBlock(tid, y, m) {
    const n = dim(y, m), lead = dowMon(y, m, 1), slots = [], multi = tmplOf(tid) === "multi";
    for (let i = 0; i < lead; i++) slots.push(null);
    for (let d = 1; d <= n; d++) slots.push(d);
    while (slots.length % 7) slots.push(null);
    let rows = "";
    for (let w = 0; w < slots.length; w += 7) {
      rows += "<tr>" + slots.slice(w, w + 7).map(d => {

        if (h) return `<td class="mc hol" title="${UI.esc(h.name)}"><span class="sc-d">${d}</span></td>`;

        const cls = ["mc", "sc", today ? "today" : "", picked ? "sel" : "", nshift ? "" : "empty-day"].filter(Boolean).join(" ");
        const note = nshift ? `${heads}p${nshift > 1 ? ` · ${nshift}×` : ""}` : (multi ? "+ add" : "—");

        const tag = mine.map(s => s.def.label[0]).join("·");

    return `<div class="mcal-month"><div class="mcal-mt">${CAL.MONTHS[m]} ${y}</div><table class="mtbl sctbl"><thead><tr>${CAL.DOW.map(w => `<th>${w}</th>`).join("")}</tr></thead><tbody>${rows}</tbody></table></div>`;

      </div>`).join("")}</div>` : UI.empty("layers", "No shift groups yet", "Bind a period × a group below — required before you can assign shifts to a day");

  function assignToolbar(tid) {

      </div>

/* ============================================================
   ADEPTIO · comms / announcements engine (BO-19/20)
   ------------------------------------------------------------
   One source of truth for staff-facing messages so the Manager
   Dashboard "Alerts & communication" composer, the Staff Home
   announcement banner, and the Staff Inbox all read the SAME data.

   • Announcements  — manager-created: immediate · scheduled · period
       (period = "stay shown for N days"). Carry a display window.
   • System notices — payslip ready, shift reminder, leave approved.
   • feed(tid)      — the unified inbox list (announcements + notices).
   • active(tid)    — announcements whose display window covers "today"
                      → the top-most banner on Staff Home.
   In-memory; recompute-on-render. Composing also drops a line into
   DATA.OUTBOX so the owner Messaging "Recent sends" reflects it.
   ============================================================ */
window.ANNOUNCE = (function () {
  const TODAY = "2026-06-16";
  const pad = (n) => String(n).padStart(2, "0");
  const isoOf = (d) => d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
  function plusDays(iso, n) { const d = new Date(iso + "T00:00:00"); d.setDate(d.getDate() + n); return isoOf(d); }

  // manager-created announcements, newest first (per tenant)
  const announcements = {
    phoungern: [
      { id: "AN-302", title: "Songkran roster is posted", body: "Pi Mai shifts are live — check your week and request swaps early.", kind: "period", from: "Owner", when: "2026-06-15 12:00", start: "2026-06-15", until: "2026-06-22", channel: "in-app · LINE", tone: "acc" },
      { id: "AN-301", title: "Team lunch this Friday 12:30", body: "Shop stands the team lunch — back-of-house covers the floor 12:30–13:30.", kind: "immediate", from: "Owner", when: "2026-06-14 09:00", start: "2026-06-14", until: null, channel: "in-app", tone: "" }
    ],
    vientianemart: [
      { id: "AN-310", title: "Stock-take Saturday morning", body: "All hands 08:00 Saturday for the monthly count.", kind: "period", from: "Owner", when: "2026-06-14 10:00", start: "2026-06-14", until: "2026-06-21", channel: "in-app", tone: "acc" }
    ]
  };

  // system notices that reach a staff member (shared by Home + Inbox)
  const notices = {
    phoungern: [
      { id: "MS-401", icon: "banknote", title: "Your June payslip is ready", sub: "Tap to see the breakdown", channel: "in-app", when: "2026-06-14 18:04", tone: "ok", go: "staff/web/pay" },
      { id: "MS-402", icon: "calendar", title: "Shift reminder — tomorrow 09:00", sub: "Floor · Main shop", channel: "LINE", when: "2026-06-14 07:30", tone: "", go: "staff/web/schedule" },
      { id: "MS-403", icon: "check", title: "Leave approved · 22–24 Jun", sub: "Annual leave · 3 days", channel: "in-app", when: "2026-06-12 16:20", tone: "", go: "staff/web/leave" }
    ],
    vientianemart: [
      { id: "MS-410", icon: "banknote", title: "Your June payslip is ready", sub: "Tap to see the breakdown", channel: "in-app", when: "2026-06-14 18:04", tone: "ok", go: "staff/web/pay" }
    ]
  };

  let seq = 320;
  const list = (tid) => announcements[tid || DATA.state.tenantId] || [];

  // a "period" window covers today; "scheduled" with a future start is upcoming; "immediate"/no-until shows once posted
  function isActive(a) {
    if (a.start && a.start > TODAY) return false;            // scheduled for the future → not on the banner yet
    if (a.until && a.until < TODAY) return false;            // period elapsed
    return true;
  }
  const active = (tid) => list(tid).filter(isActive);
  const isScheduled = (a) => a.start && a.start > TODAY;

  function statusLabel(a) {
    if (isScheduled(a)) return "scheduled · " + CAL.fmtShort(a.start);
    if (a.kind === "period" && a.until) return "showing until " + CAL.fmtShort(a.until);
    return "live now";
  }

  // manager composes: kind = immediate | scheduled | period
  function add(tid, o) {
    o = o || {};
    if (!o.title || !o.title.trim()) return { ok: false, err: "Write the announcement message first" };
    const kind = o.kind || "immediate";
    let start = TODAY, until = null, when = TODAY + " 09:00";
    if (kind === "scheduled") { if (!o.date) return { ok: false, err: "Pick the date to publish" }; start = o.date; when = o.date + " 09:00"; }
    else if (kind === "period") { const days = Math.max(1, parseInt(o.days, 10) || 7); until = plusDays(TODAY, days); }
    const id = "AN-" + (++seq);
    const rec = { id, title: o.title.trim(), body: (o.body || "").trim(), kind, from: "Owner", when, start, until, channel: o.channel || "in-app · LINE", tone: kind === "period" ? "acc" : "" };
    (announcements[tid] = announcements[tid] || []).unshift(rec);
    DATA.OUTBOX.unshift({ to: "All staff", ch: "in-app", tpl: "Announcement · " + rec.title, when: when, lang: "EN·ລາວ" });
    DATA.AUDIT.unshift({ fact: "comms.announced", who: "Owner", when: TODAY + " 09:50", ref: kind + " · " + rec.title });
    return { ok: true, rec };
  }
  function remove(tid, id) { const a = announcements[tid] || []; announcements[tid] = a.filter(x => x.id !== id); return { ok: true }; }

  // unified inbox feed: announcements (as messages) + system notices, newest first
  function feed(tid) {
    tid = tid || DATA.state.tenantId;
    const ann = list(tid).map(a => ({ id: a.id, icon: "megaphone", title: a.title, sub: a.body || a.from, channel: a.channel, when: a.when, tone: a.tone, kind: a.kind, go: "staff/web/inbox" }));
    const ns = (notices[tid] || []).slice();
    return ann.concat(ns).sort((x, y) => (x.when < y.when ? 1 : -1));
  }
  const unread = (tid) => feed(tid).length;

  function __reset() {
    seq = 320;
    // drop any manager-composed extras (id > seed range), keep seeds
    Object.keys(announcements).forEach(tid => { announcements[tid] = announcements[tid].filter(a => a.id <= "AN-310"); });
  }

  return { list, active, isActive, isScheduled, statusLabel, add, remove, feed, unread, __reset };
})();

   A dynamic dashboard the manager/owner composes for staff:

  function railShell(r) {

      <div class="group eyebrow">${g.group}</div>
      ${g.items.filter(it => !hidden.has(it.id) && (typeof it.when !== "function" || it.when())).map(it => {
      const cnt = typeof it.count === "function" ? it.count() : it.count;
      return `<button class="nav-item" aria-current="${r.screen === it.id}" data-go="${r.persona}/web/${it.id}">

  /* ---------------- two-tier shell (owner) ---------------- */
  function twoTierShell(r) {
    const P = PERSONAS[r.persona];

    const sec = P.sections.find(s => s.id === secId);
    const def = P.web[r.screen](r.param);
    const secRail = P.sections.map(s => {
      const cnt = typeof s.count === "function" ? s.count() : 0;
      return `<button class="sec-item" aria-current="${secId === s.id}" data-go="${r.persona}/web/${P.firstOf[s.id]}" title="${esc(s.title || s.label)}">
        ${icon(s.icon)}<span class="sl">${s.label}</span>${cnt ? `<span class="count">${cnt}</span>` : ""}</button>`;
    }).join("");
    let subRail = "";
    if (sec && !sec.solo) {
      const hidden = FLAGS.hiddenScreens(DATA.cur().id, "owner");
      const items = sec.sub.filter(it => !hidden.has(it.id)).map(it => {
        const cnt = typeof it.count === "function" ? it.count() : 0;
        return `<button class="nav-item" aria-current="${r.screen === it.id}" data-go="${r.persona}/web/${it.id}">
          ${icon(it.icon)}<span class="lbl">${it.label}</span>${cnt ? `<span class="count">${cnt}</span>` : ""}</button>`;

      subRail = `<aside class="subrail" aria-label="${esc(sec.title)} navigation">
        <div class="sub-head"><div class="st">${sec.tag ? `<span class="mono" style="color:var(--acc-d)">${sec.tag}</span> ` : ""}${esc(sec.title || sec.label)}</div><div class="ss">Owner console</div></div>
        ${items}

    return `${topbar(r)}
    <div class="shell two-tier">
      <aside class="sectionrail" aria-label="Owner sections"><div class="sr-head"><span class="pin">${icon(P.icon)}</span></div>${secRail}</aside>
      ${subRail}
      <main class="workspace"><div class="workspace-inner screen-fade">${head(r, P, def)}${def.body}</div></main>

  /* ---------------- mobile shell ---------------- */
  function mobileShell(r) {

  /* ---------------- render ---------------- */
  let lastRouteKey = null;
  function render() {
    const r = route();
    document.body.dataset.persona = r.view === "app" ? r.persona : (r.view === "login" ? AUTHV.state.focus : "");
    document.body.dataset.portal = (r.view === "login" || r.view === "register" || r.view === "activate") ? "1" : "";
    let html;
    if (r.view === "login") html = AUTHV.portal();
    else if (r.view === "register") html = AUTHV.registerPage(r.done);
    else if (r.view === "activate") html = AUTHV.activatePage(r.token);
    else if (r.view === "launcher") html = launcher();
    else if (r.view === "app") html = r.device === "mobile" ? mobileShell(r) : (PERSONAS[r.persona].twoTier ? twoTierShell(r) : railShell(r));
    // day-summary popup overlays the owner web console wherever the team grid lives (dashboard or full calendar)
    if (r.view === "app" && r.persona === "owner" && r.device === "web" && window.CAL && CAL.state.dayOpen) html += CAL.dayPanel(DATA.state.tenantId);
    app().innerHTML = html;
    // only jump to the top on a real navigation (route change) — in-place re-renders
    // (calendar day clicks, tab switches, tenant switch) keep the scroll position stable
    const routeKey = [r.view, r.persona, r.device, r.screen, r.param].join("|");
    if (routeKey !== lastRouteKey) { window.scrollTo(0, 0); lastRouteKey = routeKey; }
    if (r.blocked) {
      // Keep the address bar honest with what we actually rendered (the signed-in
      // persona's landing). replaceState updates the URL without firing hashchange,
      // so there's no re-render and no redirect loop.
      const fixed = "#/" + r.persona + "/" + r.device + "/" + r.screen;
      if (location.hash !== fixed && window.history && history.replaceState) history.replaceState(null, "", fixed);
      toast(r.blocked, "warn");
    }
  }

  /* ---------------- actions ---------------- */
  function signInFrom(persona) {
    const acct = document.querySelector(`[data-acct="${persona}"]`);
    const pwd = document.querySelector(`[data-pwd="${persona}"]`);
    if (!acct || !pwd) return;
    const res = AUTH.signIn(acct.value, pwd.value);
    if (res.ok) { AUTHV.state.err = ""; go(res.ses.persona + "/web/" + defScreen(res.ses.persona)); }
    else { AUTHV.state.err = res.err; render(); }
  }

  function doAct(val) {
    if (val.startsWith("toast:")) return toast(val.slice(6), "warn");
    if (val.startsWith("locked:")) return toast(val.slice(7), "warn");
    if (val.startsWith("auth-signin:")) return signInFrom(val.split(":")[1]);
    if (val === "auth-logout") { AUTH.signOut(); AUTHV.state.err = ""; return go("launcher"); }
    if (val.startsWith("portal-mode:")) { AUTH.setPortal(val.split(":")[1] === "on"); render(); return toast(AUTH.portalOn() ? "Sign-in armed — entering a persona now asks to sign in." : "Open-demo on — walk into any persona without signing in."); }
    if (val === "lang-lo") return toast("Lao language pack ships in the language wave — the portal & payslips are already bilingual.", "warn");
    // ---- staff punch (demo) — honest stub; live attendance engine (db_time) is a later pass ----
    if (val === "staff:punch") return toast("Selfie captured · punch queued ✓ — the server stamps the official time on sync. (Live attendance engine lands in a later pass.)");
    // ---- payroll lifecycle ----
    if (val === "pay-run:advance") { const r = PAYROLL.advance(); if (r.state === "close") WORK.paydayAlert(DATA.state.tenantId, r); render(); return toast("Pay run → " + r.state + (r.state === "close" ? " · posted to Books · payday alert sent" : "")); }
    if (val === "pay-run:oneclick") { const r = PAYROLL.oneClick(); WORK.paydayAlert(DATA.state.tenantId, r); render(); return toast("One-tap run complete — closed · posted to Books · payday alert sent"); }
    if (val === "pay-run:adjust") { PAYROLL.adjust(); render(); return toast("Adjustment run opened (the closed run stays immutable)"); }
    if (val.startsWith("pay-level:")) { DATA.cur().level = val.split(":")[1]; render(); return toast("Payroll level → " + DATA.cur().level); }
    // ---- cashbook ----
    if (val === "ledger:add") return ledgerAdd();
    if (val.startsWith("ledger:range:")) { LEDGER.setView(val.split(":")[2]); render(); return; }
    // ---- exports ----
    if (val === "export:payreg") return exportPayreg();
    if (val === "export:ledger") { downloadCSV("cashbook_" + DATA.state.tenantId + ".csv", LEDGER.toCSV(DATA.state.tenantId)); return toast("Cashbook exported (CSV)"); }
    if (val === "export:pl") return exportPL();
    if (val === "export:workbook") { downloadCSV("workbook_" + DATA.state.tenantId + ".csv", DW.workbook(DATA.state.tenantId)); return toast("Workbook exported — every tab in one file (CSV)"); }
    if (val === "export:vat") return exportTax("vat");
    if (val === "export:pit") return exportTax("pit");
    if (val === "export:nssf") return exportTax("nssf");
    if (val === "export:soon") return toast("PDF/XLSX export lands later — CSV works now.", "warn");
    // ---- tax centre ----
    if (val.startsWith("tax:file:")) { TAX.markFiled(DATA.state.tenantId, val.slice(9)); render(); return toast("Filed — logged tax.filed"); }
    if (val === "tax:rate-vat") return taxRateVat();
    // ---- governance: flags · approvals · db ops ----
    if (val.startsWith("flags:toggle:")) return flagToggle(val.split(":")[2]);
    if (val.startsWith("approve:")) { const p = val.split(":"); APPROVALS.decide(DATA.state.tenantId, p[1], p[2]); render(); return toast("Decision recorded · " + p[2] + " (audited)"); }
    // ---- approvals inbox view (group by team / type · remembered) ----
    if (val.startsWith("appr:mode:")) { APPROVALS.setView({ mode: val.split(":")[2], tab: null, sub: null, saved: false }); return render(); }
    if (val.startsWith("appr:tab:")) { APPROVALS.setView({ tab: val.slice("appr:tab:".length), sub: null, saved: false }); return render(); }
    if (val.startsWith("appr:sub:")) { APPROVALS.setView({ sub: val.slice("appr:sub:".length), saved: false }); return render(); }
    if (val === "appr:save") { APPROVALS.setView({ saved: true }); render(); return toast("Inbox view saved — remembered next time"); }
    // ---- manager & admin seats ----
    if (val === "access:add") return toast("Invite a manager/admin — sends an email invite (wired in a later pass)", "warn");
    // ---- staff dashboard builder (SFDC-style: catalog · place · resize) ----
    if (val.startsWith("staffdash:add:")) { const ok = STAFFDASH.add(DATA.state.tenantId, val.slice("staffdash:add:".length)); render(); return toast(ok ? "Widget added to the staff dashboard" : "Couldn't place that widget — no room", ok ? "" : "warn"); }
    if (val.startsWith("staffdash:remove:")) { STAFFDASH.remove(DATA.state.tenantId, val.slice("staffdash:remove:".length)); render(); return toast("Widget removed"); }
    if (val.startsWith("staffdash:move:")) { const p = val.split(":"); const ok = STAFFDASH.move(DATA.state.tenantId, p[2], +p[3], +p[4]); render(); if (!ok) toast("Can't move there — the edge or another widget is in the way", "warn"); return; }
    if (val.startsWith("staffdash:resize:")) { const p = val.split(":"); const ok = STAFFDASH.resize(DATA.state.tenantId, p[2], +p[3], +p[4]); render(); if (!ok) toast("Can't resize — no room or limit reached", "warn"); return; }
    if (val === "staffdash:catalog:open") { STAFFDASH.toggleCatalog(true); return render(); }
    if (val === "staffdash:catalog:close") { STAFFDASH.toggleCatalog(false); return render(); }
    if (val === "staffdash:reset") { STAFFDASH.reset(DATA.state.tenantId); render(); return toast("Staff dashboard reset to default"); }
    if (val === "dbops:backup") { DBOPS.backup(DATA.state.tenantId, "now"); render(); return toast("Backup taken — this tenant only"); }
    if (val === "dbops:export") { downloadCSV("tenant_" + DATA.state.tenantId + ".csv", DW.workbook(DATA.state.tenantId)); return toast("Tenant exported (workbook CSV)"); }
    if (val.startsWith("dbops:restore:")) { DBOPS.restore(DATA.state.tenantId, val.split(":")[2]); render(); return toast("Restore from " + val.split(":")[2] + " (audited)"); }
    if (val.startsWith("dbops:platform:")) { const op = val.split(":")[2]; DBOPS.platformOp(DATA.state.tenantId, op, "operator demo"); render(); return toast("Auto-snapshot taken, then " + op + " — audited (platform.db." + op + ")"); }
    // ---- §W feature wave ----
    if (val === "sched:publish") { WORK.publish(DATA.state.tenantId); render(); return toast("Roster published — staff can see their shifts"); }
    if (val === "sched:swap") { WORK.swap(DATA.state.tenantId, "Tinar → Souphaphone · Thu", false); render(); return toast("Swap request sent to Approvals (OT-checked)"); }
    if (val === "sched:claim") { WORK.claim(DATA.state.tenantId, "Open shift · Wed", false); render(); return toast("Open shift posted — claims land in Approvals"); }
    /* ---- jobs schedule & shifts (SCHED) ---- */
    if (val.startsWith("sched:nav:")) { SCHED.nav(val.split(":")[2]); return render(); }
    if (val === "sched:today") { SCHED.toToday(); return render(); }
    if (val.startsWith("sched:tmpl:")) { const id = val.split(":")[2]; SCHED.setTemplate(DATA.state.tenantId, id); render(); return toast("Roster template → " + (SCHED.TEMPLATES[id] ? SCHED.TEMPLATES[id].label : id)); }
    /* ---- shift configuration: periods · users groups · shift groups ---- */
    if (val === "sched:addperiod") return schedAddPeriod();
    if (val.startsWith("sched:rmperiod:")) { const r = SCHED.removePeriod(DATA.state.tenantId, val.split(":")[2]); render(); return toast(r.ok ? "Shift period removed" : r.err, r.ok ? "" : "warn"); }
    if (val === "sched:addgroup") return schedAddGroup();
    if (val.startsWith("sched:rmgroup:")) { const r = SCHED.removeGroup(DATA.state.tenantId, val.split(":")[2]); render(); return toast(r.ok ? "Users group removed" : r.err, r.ok ? "" : "warn"); }
    if (val === "sched:addsg") return schedAddShiftGroup();
    if (val.startsWith("sched:rmsg:")) { SCHED.removeShiftGroup(DATA.state.tenantId, val.split(":")[2]); render(); return toast("Shift group removed (and unassigned from any days)"); }
    /* ---- calendar assignment ---- */
    if (val === "sched:assignmode:on") { SCHED.setAssignMode(true); return render(); }
    if (val === "sched:assignmode:off") { SCHED.setAssignMode(false); return render(); }
    if (val === "sched:assignsel") return schedAssignSel();
    if (val.startsWith("sched:dayadd:")) return schedDayAdd(val.slice("sched:dayadd:".length));
    if (val.startsWith("sched:dayremove:")) { const p = val.split(":"); SCHED.dayRemoveShift(DATA.state.tenantId, p[2], p[3]); render(); return toast("Shift removed from this day"); }
    if (val.startsWith("sched:dayreset:")) { SCHED.dayReset(DATA.state.tenantId, val.slice("sched:dayreset:".length)); render(); return toast("Day reset to the default rota"); }
    if (val.startsWith("sched:edit-close")) { SCHED.closeEdit(); return render(); }
    if (val.startsWith("sched:edit:")) { SCHED.openEdit(val.slice("sched:edit:".length)); return render(); }
    if (val.startsWith("sched:day:")) { SCHED.setSelDate(val.slice("sched:day:".length)); return render(); }
    if (val.startsWith("sched:pick:")) { SCHED.pickDay(val.slice("sched:pick:".length)); return render(); }
    if (val === "sched:swap-open") { SCHED.openSwap(true); return render(); }
    if (val === "sched:swap-close") { SCHED.openSwap(false); return render(); }
    if (val === "sched:clearsel") { SCHED.clearSel(); return render(); }
    if (val === "sched:swap-submit") return schedSwapSubmit();
    if (val === "ewa:request") return ewaRequestDemo();
    if (val.startsWith("ewa:approve:")) { PAYROLL.ewaDecide(val.split(":")[2], "approve"); render(); return toast("Advance approved"); }
    if (val.startsWith("ewa:payout:")) { PAYROLL.ewaDecide(val.split(":")[2], "payout"); render(); return toast("Advance paid out — recovered on the next payslip"); }
    if (val.startsWith("ewa:reject:")) { PAYROLL.ewaDecide(val.split(":")[2], "reject"); render(); return toast("Advance rejected"); }
    if (val.startsWith("tax:nudge:")) { WORK.taxNudge(DATA.state.tenantId, val.split(":")[2]); return toast("Compliance nudge sent · in-app (LINE pending account)"); }
    // ---- run prep: per-person adjustments → draft → commit ----
    if (val === "pay:adj-save") return paySaveDraft();
    if (val === "pay:commit") return payCommit();
    // ---- registration + KYC ----
    if (val === "register:submit") return registerSubmit();
    if (val.startsWith("activate:setpw:")) return activateSetPw(val.slice("activate:setpw:".length));
    if (val === "mail:quicksecret") return mailQuickSecret();
    if (val.startsWith("kyc:feature:")) { REG.setKyc(val.split(":")[2] === "on"); render(); return toast("KYC & registration " + (REG.kycOn() ? "enabled" : "disabled · related menus hidden") + " platform-wide"); }
    if (val.startsWith("kyc:activate:")) { REG.activate(val.split(":")[2]); render(); return toast("Activated — confirmation email sent via " + REG.getChannel().provider); }
    if (val.startsWith("kyc:reject:")) { REG.reject(val.split(":")[2], "not verified"); render(); return toast("Registration rejected (reason logged)"); }
    if (val.startsWith("kyc:disable:")) { REG.disable(val.split(":")[2]); render(); return toast("Registration disabled"); }
    if (val === "kyc:autodisable") { REG.setAutoDisable(!REG.autoDisable().on); render(); return toast("Auto-disable " + (REG.autoDisable().on ? "on" : "off")); }
    if (val === "kyc:channel-save") return kycChannelSave();

      const cols = parseInt(grid.style.getPropertyValue("--cols")) || 4;
      const colGap = parseFloat(cs.columnGap) || 12, rowGap = parseFloat(cs.rowGap) || 12;
      const rowH = parseFloat(cs.gridAutoRows) || 120;

      if (e.target.closest("button")) return; // let the on-card buttons act
      const rz = e.target.closest("[data-resize]"), mv = e.target.closest("[data-drag]");
      const kind = rz ? "resize" : mv ? "move" : null; if (!kind) return;
      const id = (rz || mv).getAttribute(rz ? "data-resize" : "data-drag"); if (!id) return;
      const w = STAFFDASH.get(DATA.state.tenantId, id), el = grid.querySelector('.dbx-widget[data-wid="' + id + '"]');

      const COLS = STAFFDASH.COLS, MAXH = STAFFDASH.MAXH;
      let x, y, w, h;
      if (st.kind === "move") { w = st.o.w; h = st.o.h; x = Math.max(0, Math.min(COLS - w, st.o.x + dx)); y = Math.max(0, st.o.y + dy); }
      else { x = st.o.x; y = st.o.y; w = Math.max(1, Math.min(COLS - st.o.x, st.o.w + dx)); h = Math.max(1, Math.min(MAXH, st.o.h + dy)); }

    }
    const acct = e.target.closest("[data-acct]");
    if (acct) { const a = AUTH.find(acct.value); const pwd = document.querySelector(`[data-pwd="${acct.dataset.acct}"]`); if (a && pwd) pwd.value = a.pwd; }
  });

  // scroll shadow on topbar
  addEventListener("scroll", () => { document.body.dataset.scrolled = window.scrollY > 6 ? "true" : "false"; }, { passive: true });

  // navigation closes any open modal / mobile sub-flow (so a back arrow returns to the parent, not the form)
  window.addEventListener("hashchange", () => { if (window.CAL && CAL.closeDay) { CAL.closeDay(); CAL.openFix(false); CAL.openLeave(false); } render(); });
  render();
})();

</script>
</body>
</html>
